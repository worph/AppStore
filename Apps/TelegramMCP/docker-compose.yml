name: telegrammcp
services:
  # Nginx-hash-lock provides perimeter authentication for the web UI
  telegrammcp-proxy:
    image: ghcr.io/yundera/nginx-hash-lock:1.0.5
    restart: unless-stopped
    cpu_shares: 50
    expose:
      - 80
    user: "root"
    environment:
      AUTH_HASH: $AUTH_HASH
      BACKEND_HOST: telegrammcp
      BACKEND_PORT: "9634"
      LISTEN_PORT: "80"
    depends_on:
      - telegrammcp
    networks:
      - pcs
    labels:
      caddy_0: telegrammcp-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 80}}"
      caddy_1: telegrammcp-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 80}}"
      caddy_2: telegrammcp-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 80}}"

  # Main MCP server — reachable at telegrammcp:9634 on the pcs network
  telegrammcp:
    image: ghcr.io/worph/telegram-mcp:1.1.8
    container_name: telegrammcp
    hostname: telegrammcp
    user: $PUID:$PGID
    restart: unless-stopped
    expose:
      - 9634
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
    volumes:
      - type: bind
        source: /DATA/AppData/telegram-mcp/
        target: /app/data
    networks:
      - pcs

networks:
  pcs:
    name: pcs
    external: true

x-casaos:
  index: /?hash=$AUTH_HASH
  main: telegrammcp

  architectures:
    - amd64
    - arm64
  author: Worph
  category: Chat
  description:
    en_us: |
      Telegram MCP is a bidirectional bridge between Telegram and the Model Context Protocol (MCP).
      It acts as both an MCP server (exposing Telegram tools like send_message and send_photo to LLMs)
      and an MCP client (forwarding Telegram messages to a target MCP server for AI processing).

      Features:
      - Bidirectional communication: receive Telegram messages and send responses via MCP
      - Streamable HTTP transport for MCP connectivity
      - Built-in MCP tools: send_message, send_photo, echo, mcp_info
      - Permission flow with Telegram inline keyboard or web-based approval
      - Polling and webhook modes for Telegram bot
      - Web dashboard for runtime configuration
    zh_cn: |
      Telegram MCP 是 Telegram 和模型上下文协议 (MCP) 之间的双向桥梁。
      它既是 MCP 服务器（向 LLM 公开 send_message 和 send_photo 等 Telegram 工具），
      也是 MCP 客户端（将 Telegram 消息转发到目标 MCP 服务器进行 AI 处理）。
  developer: Worph
  icon: https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/TelegramMCP/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/TelegramMCP/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/TelegramMCP/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/TelegramMCP/screenshot-3.png
  tagline:
    en_us: Bidirectional Telegram-MCP bridge for AI-powered bot interactions
    zh_cn: 双向 Telegram-MCP 桥梁，实现 AI 驱动的机器人交互
  thumbnail: https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/TelegramMCP/thumbnail.png
  title:
    en_us: Telegram MCP
  chips:
    - key: mcp
      name:
        en_us: MCP
