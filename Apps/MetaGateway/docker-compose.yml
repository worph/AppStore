name: metagateway

# =============================================================================
# MetaGateway — bridges external sources into the MetaMesh network.
#
# A single gateway peer — the bridging tier ONLY. Every content source is now a
# SEPARATE store app (install whichever you want); the gateway discovers each by
# URL over `pcs`, stores its resolved records, and soft-skips any not installed:
#   MetaFeeder · Books      Project Gutenberg
#   MetaFeeder · Papers     arXiv / PubMed (+ Sci-Hub if configured)
#   MetaFeeder · Commons    Wikimedia Commons (+ Giphy if configured)
#   MetaFeeder · Torznab    Prowlarr indexers (video/torrent) — own enrichment
#   MetaFeeder · Tribler    Tribler IPv8 overlay (video/torrent) — own enrichment
# Plus a dedicated meta-core, and a co-located meta-share INGESTER that announces the
# gateway's resolved records on the swarm.
#
# Everything is scoped under the `metagateway-*` prefix and the per-stack
# `metagateway` network + /DATA/AppData/metagateway/ data root, so this stack
# installs alongside MetaWatch and the standalone Meta* apps with ZERO
# container-name / data-path collisions. Its meta-core is private to the
# gateway (holds resolved feeder records, not your library) — hence its own
# core rather than the shared MetaCore app.
#
# Federation: the meta-share ingester joins the PUBLIC libp2p swarm (kad-DHT,
# default cohort) on host port 4002 + mDNS on `pcs`, so MetaWatch peers find it.
# =============================================================================

services:
  # ===========================================================================
  # metagateway-core — dedicated meta-core. Auto-store target for every resolved
  # feeder outcome; the gateway becomes a regular meta-core host of the CID.
  # File watcher ON so tmdb-plugin posters PUT over WebDAV get indexed + seeded.
  # ===========================================================================
  metagateway-core:
    # 1.0.1 carries the new meta-core API (records cids/ set, identity).
    image: ghcr.io/worph/meta-core:1.0.1
    container_name: metagateway-core
    hostname: metagateway-core
    restart: unless-stopped
    privileged: true
    user: "0:0"
    cpu_shares: 50
    expose:
      - 9000
    volumes:
      - /DATA/AppData/metagateway/metacore:/meta-core:rw
      - /DATA/AppData/metagateway/files:/files:rw
    environment:
      - META_CORE_PATH=/meta-core
      - FILES_PATH=/files
      - SERVICE_NAME=meta-core
      - SERVICE_VERSION=1.0.0
      - META_CORE_HTTP_PORT=9000
      - META_CORE_HTTP_HOST=0.0.0.0
      - REDIS_PORT=6379
      - BASE_URL=http://metagateway-core:9000
      - ENABLE_FILE_WATCHER=true
      - WATCH_INTERVAL_MS=1000
      - TZ=$TZ
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9000/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    # `pcs` so the external feeder apps can write records/posters to this core.
    networks:
      - metagateway
      - pcs

  # ===========================================================================
  # metagateway-share — meta-share INGESTER role (META_CORE_URL set). Polls this
  # gateway's meta-core, announces resolved records on Kamilata + rebuilds its
  # Bloom filter, and seeds blobs over IPFS/bitswap so federated MetaWatch
  # queries reach the gateway's records. Public libp2p on host port 4002.
  # ===========================================================================
  metagateway-share:
    image: ghcr.io/worph/meta-share:1.0.2
    container_name: metagateway-share
    hostname: metagateway-share
    restart: unless-stopped
    user: "0:0"
    cpu_shares: 30
    expose:
      - 3000
    ports:
      - "4002:4001"
    volumes:
      - /DATA/AppData/metagateway/metacore:/meta-core:rw
    environment:
      HTTP_LISTEN: "0.0.0.0:3000"
      P2P_LISTEN: "/ip4/0.0.0.0/tcp/4001"
      RUST_LOG: "info,meta_share=info,kamilata=info,beetswap=info"
      META_CORE_URL: "http://metagateway-core:9000"
      META_CORE_PATH: "/meta-core"
      META_CORE_POLL_SECS: "30"
      # A busy gateway accumulates far more than a small cohort's records.
      META_CORE_MAX_RECORDS: "5000"
      SERVICE_NAME: "meta-share"
      BASE_URL: "http://metagateway-share:3000"
      META_SHARE_PEER_API_URL: "http://metagateway-share:3000"
      KAD_NAMESPACE: "metamesh-share-default"
      TARGET_PEER_COUNT: "8"
      ENABLE_MDNS: "true"
      TZ: "$TZ"
    depends_on:
      metagateway-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - metagateway
      - pcs

  # ===========================================================================
  # metagateway-app — the gateway peer (feeders-only). Discovers the feeder
  # sidecars from /data/meta-gateway/gateway-config.json (written by
  # pre-install-cmd), registers a RemoteFeederPlugin per upstream, and writes
  # resolved records to its meta-core. Dashboard fronted by the hash-lock below.
  # ===========================================================================
  metagateway-app:
    image: ghcr.io/worph/meta-gateway:1.0.3
    container_name: metagateway-app
    hostname: metagateway-app
    restart: unless-stopped
    cpu_shares: 40
    expose:
      - 3000
    volumes:
      # gateway-config.json (feeders map) + gateway-enabled.json, written by
      # pre-install-cmd. Runtime redb caches also live here.
      - /DATA/AppData/metagateway/state:/data/meta-gateway:rw
    environment:
      META_GATEWAY_HTTP_LISTEN: "0.0.0.0:3000"
      META_GATEWAY_STATE_DIR: "/data/meta-gateway"
      META_CORE_URL: "http://metagateway-core:9000"
      META_GATEWAY_PEER_ID: "metagateway"
      META_GATEWAY_BASE_URL: "http://metagateway-app:3000"
      RUST_LOG: "info,meta_gateway=info"
      TZ: "$TZ"
    depends_on:
      metagateway-core:
        condition: service_healthy
      # ALL feeders (book/paper/common + torznab/tribler) are SEPARATE store apps
      # now — the gateway discovers them by URL from its feeders config and
      # soft-skips any not installed, so they're not startup deps here.
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    # `pcs` so the gateway can reach the external feeder apps for discovery/query.
    networks:
      - metagateway
      - pcs

  # NOTE: ALL feeders are now SEPARATE store apps — the generic ones
  # (MetaFeeder · Books / Papers / Commons) and the torrent ones
  # (MetaFeeder · Torznab / Tribler). The gateway is purely the bridging tier:
  # it discovers every feeder by URL (feeders config / dashboard) over `pcs`,
  # stores their resolved records in its meta-core, and announces them on the
  # swarm. Install whichever feeders you want; the gateway soft-skips any not
  # reachable. No feeder sidecars are bundled here anymore.

  # ===========================================================================
  # OIDC perimeter for the MetaGateway dashboard. container_name MUST equal the
  # URL prefix (`metagateway`) for the registrar's redirect-URI allowlist.
  # ===========================================================================
  metagateway:
    image: ghcr.io/yundera/nginx-hash-lock:1.0.7
    container_name: metagateway
    hostname: metagateway
    restart: unless-stopped
    user: "0:0"
    expose:
      - 80
    environment:
      OIDC_REGISTRAR_URL: "http://auth-registrar:9092"
      BACKEND_HOST: "metagateway-app"
      BACKEND_PORT: "3000"
      LISTEN_PORT: "80"
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    depends_on:
      - metagateway-app
    labels:
      # ---- metagateway-${APP_DOMAIN} (gateway TLS) ----
      caddy_0: metagateway-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.0_handle: "/health"
      caddy_0.0_handle.reverse_proxy: "metagateway-app:3000"
      caddy_0.1_handle: ""
      caddy_0.1_handle.reverse_proxy: "{{upstreams 80}}"

      # ---- metagateway-IP.nip.io (gateway TLS) ----
      caddy_1: metagateway-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.0_handle: "/health"
      caddy_1.0_handle.reverse_proxy: "metagateway-app:3000"
      caddy_1.1_handle: ""
      caddy_1.1_handle.reverse_proxy: "{{upstreams 80}}"

      # ---- metagateway-IP.sslip.io (Let's Encrypt) ----
      caddy_2: metagateway-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.0_handle: "/health"
      caddy_2.0_handle.reverse_proxy: "metagateway-app:3000"
      caddy_2.1_handle: ""
      caddy_2.1_handle.reverse_proxy: "{{upstreams 80}}"
    networks:
      - metagateway
      - pcs

  # ===========================================================================
  # AppShield gates — expose the bundled service UIs behind Yundera OIDC SSO so
  # they're reachable + configurable from the dashboard's service links.
  # AppShield's container_name MUST equal its subdomain prefix (the auth-registrar
  # derives the OIDC client_id from it), so these use collision-free prefixes —
  # `metagateway-core`/`-share` are already the backend names. These backends
  # have no native auth, so they're reachable ONLY through these gates.
  #   metagatewaycore  → meta-core dashboard (nginx :80, NOT the :9000 API)
  #   metagatewayshare → meta-share dashboard (:3000)
  # Prowlarr + Tribler are SEPARATE store apps (their own UIs + auth); the
  # feeders reach them over `pcs`, so there's no gate for them here.
  # ===========================================================================
  metagatewaycore:
    image: ghcr.io/yundera/appshield:2.0.3
    container_name: metagatewaycore
    hostname: metagatewaycore
    restart: unless-stopped
    user: "0:0"
    expose: ["80"]
    environment:
      OIDC_REGISTRAR_URL: "http://auth-registrar:9092"
      REDIRECT_HOST_SUFFIXES: "${APP_DOMAIN},${APP_PUBLIC_IP_DASH}.nip.io,${APP_PUBLIC_IP_DASH}.sslip.io"
      CREDENTIAL_VALIDATE_URL: "http://casaos-oidc-bridge:8090/validate"
      BACKEND_HOST: "metagateway-core"
      BACKEND_PORT: "80"
      LISTEN_PORT: "80"
    labels:
      caddy_0: metagatewaycore-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 80}}"
      caddy_1: metagatewaycore-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 80}}"
      caddy_2: metagatewaycore-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 80}}"
    depends_on:
      - metagateway-core
    networks:
      - metagateway
      - pcs

  metagatewayshare:
    image: ghcr.io/yundera/appshield:2.0.3
    container_name: metagatewayshare
    hostname: metagatewayshare
    restart: unless-stopped
    user: "0:0"
    expose: ["80"]
    environment:
      OIDC_REGISTRAR_URL: "http://auth-registrar:9092"
      REDIRECT_HOST_SUFFIXES: "${APP_DOMAIN},${APP_PUBLIC_IP_DASH}.nip.io,${APP_PUBLIC_IP_DASH}.sslip.io"
      CREDENTIAL_VALIDATE_URL: "http://casaos-oidc-bridge:8090/validate"
      BACKEND_HOST: "metagateway-share"
      BACKEND_PORT: "3000"
      LISTEN_PORT: "80"
    labels:
      caddy_0: metagatewayshare-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 80}}"
      caddy_1: metagatewayshare-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 80}}"
      caddy_2: metagatewayshare-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 80}}"
    depends_on:
      - metagateway-share
    networks:
      - metagateway
      - pcs

networks:
  metagateway:
    name: metagateway
  pcs:
    name: pcs
    external: true

x-casaos:
  architectures:
    - amd64
    - arm64
  author: Worph Team
  category: Media
  developer: Aptero Team

  description:
    en_us: |
      **The source-bridging tier for the MetaMesh network.**

      MetaGateway ingests content from external sources and makes it
      discoverable across the MetaMesh federation — so MetaWatch (and other
      MetaShare peers) can find and stream it. It's the **bridging tier only**:
      a dedicated meta-core that stores resolved records, plus a co-located
      meta-share ingester that announces them on the swarm. Every content source
      is a **separate MetaFeeder app** (Books, Papers, Commons, Torrent-Usenet)
      — install whichever you want; the gateway discovers each over the shared
      network and soft-skips any not installed.

      **Sources (each a separate store app):**
      - **Torrent-Usenet** - Torznab/Newznab indexers via the separate Prowlarr app, plus decentralized Tribler discovery (video/torrent/usenet)
      - **Project Gutenberg** - Public-domain books
      - **arXiv / PubMed** - Academic papers (optional Sci-Hub mirror)
      - **Wikimedia Commons** - Open-licensed images (optional Giphy)

      **How it fits:** MetaGateway is the *producer*; **MetaWatch** is the
      *consumer*. Install MetaGateway to populate the network, then browse it in
      MetaWatch. Self-contained — its meta-core is private to the gateway, so it
      coexists with MetaWatch and the standalone Meta* apps without conflicts.

      **Enrichment:** Each resolved release is enriched with filename parsing and
      TMDB metadata (canonical content-addressed posters + plot) so it surfaces
      cleanly in MetaWatch's poster-gated wall.

    fr_fr: |
      **La couche de passerelle de sources pour le réseau MetaMesh.**

      MetaGateway ingère du contenu depuis des sources externes et le rend
      découvrable à travers la fédération MetaMesh — pour que MetaWatch (et les
      autres pairs MetaShare) puissent le trouver et le lire. Elle exécute tout
      le lot de feeders en sidecars, plus un Prowlarr intégré, un cœur Tribler
      headless, les plugins d'enrichissement meta-sort, un meta-core dédié et un
      ingesteur meta-share co-localisé qui annonce les enregistrements résolus.

      **Sources (chacune une app du store) :**
      - **Torrent-Usenet** - Indexeurs Torznab/Newznab via l'app Prowlarr, plus la découverte décentralisée Tribler (vidéo/torrent/usenet)
      - **Project Gutenberg** - Livres du domaine public
      - **arXiv / PubMed** - Articles académiques (miroir Sci-Hub optionnel)
      - **Wikimedia Commons** - Images sous licence libre (Giphy optionnel)

      **Place dans l'écosystème :** MetaGateway est le *producteur* ; **MetaWatch**
      est le *consommateur*. Installez MetaGateway pour alimenter le réseau, puis
      parcourez-le dans MetaWatch. Autonome — son meta-core est privé, donc il
      cohabite avec MetaWatch et les apps Meta* sans conflit.

  tagline:
    en_us: Bridge torrent/usenet, books, papers and images into the MetaMesh network
    fr_fr: Connectez torrent/usenet, livres, articles et images au réseau MetaMesh

  title:
    en_us: MetaGateway

  icon: https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaGateway/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaGateway/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaGateway/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaGateway/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaGateway/thumbnail.png

  index: /
  store_app_id: metagateway
  main: metagateway
  is_uncontrolled: false

  tips:
    before_install:
      en_us: |
        **Self-contained — no MetaCore required.** MetaGateway ships its own
        meta-core, ingester and feeders. Pair it with **MetaWatch** to browse
        what it surfaces.

        **Authentication:** The gateway dashboard is protected by Yundera's
        Authelia via OIDC.

        **The gateway works out of the box.** Books, papers and common-media
        feeders need no setup. Torrent/video needs the separate **Prowlarr** and
        **Tribler** apps — until they're installed + configured, those feeders
        simply show as **"degraded"** in the dashboard (they don't crash the app).

        **Torznab / Prowlarr setup (required for torrent video):**
        1. Install the **Prowlarr** app from the store (it runs on the shared
           network as `prowlarr`).
        2. Open Prowlarr, complete its first-run wizard, then Indexers → Add
           Indexer → add one or more public indexers (confirm they test green).
        3. Settings → General → copy the **API Key**.
        4. In the gateway dashboard, open the **torznab** plugin → configure, paste
           the key into the indexer's API-key field, and Save. The torznab feeder
           auto-reloads and turns healthy.

        **Tribler (optional, decentralized torrents):** install the **Tribler**
        app from the store; the gateway's tribler feeder connects to it
        automatically over the shared network — no key needed.

        **TMDB enrichment:** set the TMDB v4 token in the torznab / tribler plugin
        config (dashboard) for canonical posters + overviews.

        **Federation port (optional).** The meta-share ingester host-publishes
        its libp2p listener on TCP **4002** — open it inbound for best cross-node
        reach; same-host discovery (a MetaWatch on the same box) works over mDNS.

  pre-install-cmd: |
    mkdir -p /DATA/AppData/metagateway/metacore
    mkdir -p /DATA/AppData/metagateway/files
    mkdir -p /DATA/AppData/metagateway/state
    # Feeders map: all feeders are now SEPARATE store apps, listed by their pcs
    # URLs (MetaFeeder · Books / Papers / Commons / Torznab / Tribler). The
    # gateway soft-skips any feeder that isn't installed/reachable, and you can
    # add/remove feeders at runtime from the dashboard.
    cat > /DATA/AppData/metagateway/state/gateway-config.json <<'JSON'
    {
      "feeders": {
        "metafeederbook-feeder":     { "url": "http://metafeederbook-feeder:8080" },
        "metafeederpaper-feeder":    { "url": "http://metafeederpaper-feeder:8080" },
        "metafeedercommon-feeder":   { "url": "http://metafeedercommon-feeder:8080" },
        "metafeedertorznab-feeder":  { "url": "http://metafeedertorznab-feeder:8080" },
        "metafeedertribler-feeder":  { "url": "http://metafeedertribler-feeder:8080" }
      }
    }
    JSON
    cat > /DATA/AppData/metagateway/state/gateway-enabled.json <<'JSON'
    {
      "disabled": [],
      "enabled_opt_in": ["torznab", "tribler"]
    }
    JSON
