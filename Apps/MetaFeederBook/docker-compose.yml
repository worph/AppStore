name: metafeederbook

# =============================================================================
# MetaFeeder · Books — a standalone Project Gutenberg feeder for MetaMesh.
#
# Split out of MetaGateway so you can run only the feeders you want. Headless
# (no enrichment, no config needed): it finds public-domain books and returns
# the records to the MetaGateway core, which stores + announces them. The
# gateway must list this feeder's URL (`http://metafeederbook-feeder:8080`) in
# its feeders config (both on the shared `pcs` network).
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # metafeederbook-feeder — the gutenberg feeder. The gateway reaches it on `pcs`
  # for discovery/query; it returns records (no meta-core, no enrichment).
  # ---------------------------------------------------------------------------
  metafeederbook-feeder:
    image: ghcr.io/worph/meta-feeder-book:1.0.1
    container_name: metafeederbook-feeder
    hostname: metafeederbook-feeder
    restart: unless-stopped
    user: "0:0"
    expose:
      - 8080
    environment:
      RUST_LOG: "info,meta_feeder=info"
      META_FEEDER_STATE_DIR: "/data/meta-feeder"
      TZ: "$TZ"
    volumes:
      # Persist feeder config.json + redb cache so it survives recreate.
      - /DATA/AppData/metafeederbook/state:/data/meta-feeder:rw
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - metafeederbook
      - pcs

  # ---------------------------------------------------------------------------
  # AppShield gate — the feeder's config page behind Yundera OIDC SSO.
  # container_name == subdomain prefix (the auth-registrar derives the client_id
  # from it). The gateway still reaches the feeder directly on `pcs`; index → /config.
  # ---------------------------------------------------------------------------
  metafeederbook:
    image: ghcr.io/yundera/appshield:2.0.3
    container_name: metafeederbook
    hostname: metafeederbook
    restart: unless-stopped
    user: "0:0"
    expose:
      - 80
    environment:
      OIDC_REGISTRAR_URL: "http://auth-registrar:9092"
      REDIRECT_HOST_SUFFIXES: "${APP_DOMAIN},${APP_PUBLIC_IP_DASH}.nip.io,${APP_PUBLIC_IP_DASH}.sslip.io"
      CREDENTIAL_VALIDATE_URL: "http://casaos-oidc-bridge:8090/validate"
      BACKEND_HOST: "metafeederbook-feeder"
      BACKEND_PORT: "8080"
      LISTEN_PORT: "80"
    labels:
      caddy_0: metafeederbook-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 80}}"
      caddy_1: metafeederbook-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 80}}"
      caddy_2: metafeederbook-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 80}}"
    depends_on:
      - metafeederbook-feeder
    networks:
      - metafeederbook
      - pcs

networks:
  metafeederbook:
    name: metafeederbook
  pcs:
    name: pcs
    external: true

x-casaos:
  architectures:
    - amd64
    - arm64
  author: Worph Team
  category: Media
  developer: Aptero Team
  main: metafeederbook
  webui_port: 80
  index: /config

  description:
    en_us: |
      **A standalone Project Gutenberg feeder for the MetaMesh network.**

      MetaFeeder · Books bridges public-domain books from Project Gutenberg into
      MetaMesh so they surface across the federation. Split out of MetaGateway so
      you can run only the feeders you want — headless, no setup required.

      **Requires (from the store):**
      - **MetaGateway** — its meta-core stores the resolved records and announces
        them to the swarm. The gateway must list this feeder in its config.
    fr_fr: |
      **Un feeder Project Gutenberg autonome pour le réseau MetaMesh.**

      MetaFeeder · Books connecte les livres du domaine public de Project
      Gutenberg à MetaMesh. Détaché de MetaGateway pour n'exécuter que les feeders
      souhaités — sans configuration. **Nécessite** l'app **MetaGateway**.

  tagline:
    en_us: Standalone Project Gutenberg feeder for the MetaMesh network
    fr_fr: Feeder Project Gutenberg autonome pour le réseau MetaMesh

  title:
    en_us: MetaFeeder · Books

  icon: https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaFeederBook/icon.png
  thumbnail: https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaFeederBook/thumbnail.png

  store_app_id: metafeederbook
  is_uncontrolled: false

  tips:
    before_install:
      en_us: |
        **Install order:** install **MetaGateway** first.

        **After installing this app:** in **MetaGateway**, make sure this feeder
        is listed in its feeders config (`http://metafeederbook-feeder:8080`) so
        it gets discovered (or add it from the gateway dashboard). No other setup.

        **Authentication:** the config UI is protected by Yundera's Authelia (OIDC).

  pre-install-cmd: |
    mkdir -p /DATA/AppData/metafeederbook/state
