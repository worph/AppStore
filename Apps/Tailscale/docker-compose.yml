name: tailscale

services:
  tailscale:
    image: ghcr.io/tailscale/tailscale:v1.94.2
    container_name: tailscale
    hostname: tailscale
    user: 0:0
    network_mode: host
    cpu_shares: 70
    # only uncomment  for commpatibility with some linux distros
    #command: [ "tailscaled", "--socket=/tmp/tailscaled.sock", "--statedir=/var/lib/tailscale", "--tun=kernel" ]
    environment:
      - TZ=$TZ
      # if you want to use headscale instead of tailscale.com, add the next line and set your domain
      # - TS_EXTRA_ARGS=--login-server=https://headscale-$APP_DOMAIN
      - TS_ACCEPT_DNS="true"
      - TS_EXTRA_ARGS="--accept-routes"
      - TS_AUTHKEY_INFO="Connect to the Tailscale Admin Console to generate an auth key and set it in the app settings before starting."
      - TS_AUTHKEY=  # Set this in CasaOS before starting for automatic auth, or leave blank for manual setup
      - TS_HOSTNAME=$APP_DOMAIN
      - TS_USERSPACE="false"
      - TS_STATE_DIR=/var/lib/tailscale
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - /DATA/AppData/tailscale/state/:/var/lib/tailscale/
      - /dev/net/tun:/dev/net/tun
    restart: unless-stopped

x-casaos:
  pre-install-cmd: |
    mkdir -p /DATA/AppData/tailscale/state &&
    chown -R $PUID:$PGID /DATA/AppData/tailscale

  #this is the link for the webui port
  scheme: https
  hostname: login.tailscale.com
  port_map: "443"
  index: /

  architectures:
    - amd64
    - arm64
  author: Yundera
  category: Network
  description:
    en_us: "Tailscale is a secure mesh VPN that creates encrypted connections between your devices. This container runs the Tailscale node daemon with web UI enabled for easy device management. Connect your CasaOS server to your Tailscale network to access it securely from anywhere. Includes exit node functionality to route traffic through your server and accept routes from other nodes. Perfect for secure remote access to your home lab and services."
  developer: Tailscale Inc.
  icon: https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Tailscale/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Tailscale/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Tailscale/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Yundera/AppStore@main/Apps/Tailscale/screenshot-3.png
  tagline:
    en_us: Zero-config mesh VPN for secure device connections
  title:
    en_us: Tailscale
  tips:
    before_install:
      en_us: |
        **📡 After Installation:**
        
        **For Tailscale.com (Default):**
        1. Go to [Tailscale Admin Console](https://login.tailscale.com/admin/settings/keys)
        2. Generate an auth key with your desired settings
           - Click **"Add device" → "Linux server" → "Generate install script"**
        3. Copy the key from the generated install script
        
           Example script:
           ```
           curl -fsSL https://tailscale.com/install.sh | sh && sudo tailscale up --auth-key=tskey-auth-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
           ```
        
           👉 You only need the **auth key**, which is the last part:
           ```
           tskey-auth-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
           ```
        4. Go to your PCS, click on the **3 dots** on the Tailscale app, then click **Settings**
        5. Set the auth key in the app settings
        
           In the field:
           ```
           TS_AUTHKEY=
           ```
        
           👉 Paste **only the key after the `=`**, like this:
           ```
           TS_AUTHKEY=tskey-auth-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
           ```
        
           ⚠️ Do not include spaces or extra characters
        6. Start or restart the app
        7. Your server will appear in your Tailscale network
        
        **For Headscale (Self-hosted):**
        1. Generate an auth key from your Headscale server
        2. Set the `TS_AUTHKEY` in the app settings
        3. Set the `TS_EXTRA_ARGS` to `--login-server=https://your-headscale-domain`
        4. Your server will appear in your Headscale network
        
        **🔗 Making Other Services Available:**
        For other services to be accessible through Tailscale, you need to bind their ports to the Tailscale interface IP address:
        ```
          HOST_PORT= 100.x.x.x:8080     # Replace with your actual Tailscale IP
          CONTAINER_PORT= 8080
        ```
        You can find your Tailscale IP by running `tailscale ip` on the terminal or checking the Tailscale admin console.
