name: nextcloudmcp
services:
  # Main MCP wrapper — exposes /mcp (Nextcloud tools), /talk-mcp (Talk tools),
  # and the Web UI on 9650. Reachable at nextcloudmcp:9650 inside the pcs
  # network so Beacon and other MCP clients can call it directly (no hash
  # auth needed for container-to-container traffic).
  nextcloudmcp:
    image: ghcr.io/worph/nextcloud-mcp:1.0.0
    container_name: nextcloudmcp
    hostname: nextcloudmcp
    restart: unless-stopped
    expose:
      - 9650
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      - PORT=9650
      - UPSTREAM_PORT=8000
      - DISCOVERY_PORT=9099
      - CONFIG_PATH=/app/wrapper-data/config.json
      # Pre-seed the sibling Nextcloud app's in-cluster hostname if it's
      # installed. Username + app-password stay empty — set in the Web UI
      # on first launch (Settings → Personal → Security → Devices &
      # sessions → Create new app password).
      - NEXTCLOUD_HOST=http://nextcloud:80
    volumes:
      - type: bind
        source: /DATA/AppData/nextcloudmcp/
        target: /app/wrapper-data
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
        reservations:
          memory: 256M
    networks:
      - pcs

  # Nginx-hash-lock gates the Web UI so the Nextcloud app-password you paste
  # into it isn't reachable by anyone guessing the subdomain. MCP clients
  # talking to `nextcloudmcp:9650` directly on the pcs network bypass this,
  # which is what we want — Beacon discovery, Claude Code, etc. stay fast.
  nextcloudmcp-proxy:
    image: ghcr.io/yundera/nginx-hash-lock:1.0.5
    restart: unless-stopped
    cpu_shares: 50
    expose:
      - 80
    user: "root"
    environment:
      AUTH_HASH: $AUTH_HASH
      BACKEND_HOST: nextcloudmcp
      BACKEND_PORT: "9650"
      LISTEN_PORT: "80"
      USER: "ADMIN"
      PASSWORD: $APP_DEFAULT_PASSWORD
    depends_on:
      - nextcloudmcp
    networks:
      - pcs
    labels:
      caddy_0: nextcloudmcp-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 80}}"
      caddy_1: nextcloudmcp-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 80}}"
      caddy_2: nextcloudmcp-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 80}}"

networks:
  pcs:
    name: pcs
    external: true

x-casaos:
  architectures:
    - amd64
    - arm64
  main: nextcloudmcp
  index: /?hash=$AUTH_HASH
  author: Worph
  category: Utilities
  description:
    en_us: |
      **Your entire Nextcloud — Notes, Calendar, Contacts, Files, Deck, Talk — exposed to AI assistants via MCP.**

      Nextcloud MCP wraps the open-source `cbcoutinho/nextcloud-mcp-server` to give Claude, Cursor, and any MCP-compatible LLM direct, authenticated access to your Nextcloud. Plus, with one toggle, Claude will auto-respond to your Talk DMs and direct @mentions on your behalf — no bot registration, no `occ` commands, no public URL required.

      **What you can do:**
      - Let AI read/write your Notes, Calendar events, Contacts, Deck cards, Tables, Cookbook recipes, News feeds, Collectives pages, and files (WebDAV).
      - Auto-respond to incoming Talk DMs with Claude — replies land in the chat within seconds.
      - Reply to `@<you>` mentions in group chats automatically (presence-immune — works even when you have Talk open).
      - Send chat messages to anyone in Nextcloud from an AI prompt (`talk_send_to_user` — resolves name to 1-on-1 and posts).
      - Drive it all through the Beacon MCP aggregator (auto-detected) for unified access.

      **118 Nextcloud tools + 6 Talk tools.** Single app-password setup. Polling-based (no admin CLI). See the built-in docs and `docs/design-decisions.md` for the full rationale.

      **Think of it like:** a personal AI assistant that genuinely lives inside your Nextcloud — messages go to *you*, answers come from Claude, your team gets replies within seconds.
    zh_cn: |
      **将整个 Nextcloud — 笔记、日历、通讯录、文件、Deck、Talk — 通过 MCP 暴露给 AI 助手。**

      Nextcloud MCP 封装了开源的 `cbcoutinho/nextcloud-mcp-server`，让 Claude、Cursor 和任何兼容 MCP 的 LLM 可以直接、经过身份验证地访问您的 Nextcloud。此外，通过一个开关，Claude 将代表您自动回复 Talk 私信和直接 @提及 — 无需机器人注册，无需 `occ` 命令，也不需要公共 URL。

      **功能：**
      - 让 AI 读取/写入您的笔记、日历事件、联系人、Deck 卡片、表格、食谱、新闻订阅、Collectives 页面和文件（WebDAV）。
      - 使用 Claude 自动回复 Talk 私信 — 几秒内回复到达聊天。
      - 自动回复群聊中的 `@<您>` 提及（免受在线状态影响 — 即使您打开 Talk 也能工作）。
      - 从 AI 提示向 Nextcloud 中的任何人发送聊天消息（`talk_send_to_user` — 将名称解析为 1 对 1 并发布）。
      - 通过 Beacon MCP 聚合器（自动检测）统一驱动所有功能。

      **118 个 Nextcloud 工具 + 6 个 Talk 工具。** 一次应用密码设置。基于轮询（无需管理员 CLI）。详见内置文档和 `docs/design-decisions.md`。
