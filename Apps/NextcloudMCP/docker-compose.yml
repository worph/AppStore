      name:
        en_us: MCP
  tips:
    before_install:
      en_us: |
        **Getting Started**

        Nextcloud MCP needs access to a Nextcloud account (the sibling `Nextcloud` app works great). After installation:

        1. In Nextcloud, go to **Settings → Personal → Security → Devices & sessions** and click **Create new app password** (name it `nextcloudmcp`).
        2. Open the Nextcloud MCP Web UI and paste the URL, username, and app-password.
        3. Click **Test connection**, then **Save**.
        4. (Optional) In the **LLM Target** panel, click **Rescan Beacon** — if an LLM MCP (e.g. ClaudeCode) is installed on the same server, it's auto-selected.
        5. (Optional) Enable **Auto-respond** to let Claude reply to your Talk DMs and `@<you>` mentions automatically.

        **MCP Integration (for AI/LLMs):**

        The app exposes two MCP servers — `nextcloud-mcp` (118 Nextcloud tools) and `nextcloud-talk-mcp` (6 chat tools).

        **Option 1: Via Beacon (recommended)**
        If Beacon is installed, both servers are auto-discovered and namespaced:
        - `nextcloud-mcp__nc_notes_*`, `nextcloud-mcp__nc_calendar_*`, `nextcloud-mcp__deck_*`, etc.
        - `nextcloud-talk-mcp__talk_send_to_user`, `nextcloud-talk-mcp__talk_list_conversations`, etc.

        **Option 2: Public URL (with hash auth)**
        ```json
        {
          "mcpServers": {
            "nextcloud-mcp": {
              "type": "http",
              "url": "https://nextcloudmcp-${APP_DOMAIN}/mcp?hash=${AUTH_HASH}"
            },
            "nextcloud-talk-mcp": {
              "type": "http",
              "url": "https://nextcloudmcp-${APP_DOMAIN}/talk-mcp?hash=${AUTH_HASH}"
            }
          }
        }
        ```

        **Option 3: Local Docker connection (no auth required)**
        ```json
        {
          "mcpServers": {
            "nextcloud-mcp": {
              "type": "http",
              "url": "http://nextcloudmcp:9650/mcp"
            },
            "nextcloud-talk-mcp": {
              "type": "http",
              "url": "http://nextcloudmcp:9650/talk-mcp"
            }
          }
        }
        ```
        *Note: Requires the AI assistant to be on the `pcs` Docker network.*

        **Available MCP Tools:**

        | Category | Prefix | Examples |
        |---|---|---|
        | Notes | `nc_notes_*` | `create_note`, `update_note`, `search_notes` |
        | Calendar & Todos | `nc_calendar_*` | `create_event`, `find_availability`, `create_todo` |
        | Contacts | `nc_contacts_*` | `list_contacts`, `create_contact`, `update_contact` |
        | Files (WebDAV) | `nc_webdav_*` | `list_directory`, `read_file`, `write_file`, `search_files` |
        | Deck (Kanban) | `deck_*` | `create_board`, `create_card`, `assign_user_to_card` |
        | Cookbook | `nc_cookbook_*` | `list_recipes`, `import_recipe`, `search_recipes` |
        | Tables | `nc_tables_*` | `list_tables`, `insert_row`, `update_row` |
        | Sharing | `nc_share_*` | `share_create`, `share_list`, `share_update` |
        | News | `nc_news_*` | `list_feeds`, `list_items`, `get_starred_items` |
        | Collectives | `collectives_*` | `create_page`, `search_pages`, `assign_tag` |
        | **Talk (chat)** | `talk_*` | `send_to_user`, `list_conversations`, `get_messages` |

        **Auto-respond Mode:**

        When enabled, the app long-polls every DM and group chat your account is in. A real user's DM or a direct `@<you>` mention in a group triggers a call to the configured LLM (Claude Code via Beacon by default). The reply is posted back to Talk — prefixed with `🤖 ` so humans can tell AI-generated answers apart.

        - Presence-immune: works even while you have Talk open in a browser.
        - Own-message-aware: never responds to its own replies or to messages you typed from another client.
        - Gapless: resumes at the right cursor after restarts (state in `data/poll-state.json`).
      zh_cn: |
        **快速开始**

        Nextcloud MCP 需要访问 Nextcloud 账户（同级 `Nextcloud` 应用即可）。安装后：

        1. 在 Nextcloud 中，转到 **设置 → 个人 → 安全 → 设备和会话**，点击 **创建新的应用密码**（命名为 `nextcloudmcp`）。
        2. 打开 Nextcloud MCP Web UI，粘贴 URL、用户名和应用密码。
        3. 点击 **测试连接**，然后 **保存**。
        4. （可选）在 **LLM Target** 面板中，点击 **重新扫描 Beacon** — 如果同一服务器上安装了 LLM MCP（例如 ClaudeCode），它将被自动选中。
        5. （可选）启用 **自动回复**，让 Claude 自动回复您的 Talk 私信和 `@<您>` 提及。

        **MCP 集成（用于 AI/LLM）：**

        应用公开了两个 MCP 服务器 — `nextcloud-mcp`（118 个 Nextcloud 工具）和 `nextcloud-talk-mcp`（6 个聊天工具）。

        **选项 1：通过 Beacon（推荐）**
        如果安装了 Beacon，两个服务器都会自动发现并命名空间化。

        **选项 2：公共 URL（使用 hash 认证）**
        ```json
        {
          "mcpServers": {
            "nextcloud-mcp": {
              "type": "http",
              "url": "https://nextcloudmcp-${APP_DOMAIN}/mcp?hash=${AUTH_HASH}"
            }
          }
        }
        ```

        **选项 3：本地 Docker 连接（无需认证）**
        ```json
        {
          "mcpServers": {
            "nextcloud-mcp": {
              "type": "http",
              "url": "http://nextcloudmcp:9650/mcp"
            }
          }
        }
        ```
        *注意：需要 AI 助手在 `pcs` Docker 网络上。*
