name: metafeedertorznab

# =============================================================================
# MetaFeeder · Torznab — a STANDALONE torrent-indexer feeder for MetaMesh.
#
# Split out of the MetaGateway stack so the torrent sources are modular: install
# only the feeders you want. This app bridges a **Prowlarr** indexer (the
# separate Prowlarr store app) into the MetaMesh network and is self-contained
# for enrichment — it ships its own filename-parser + tmdb plugins.
#
# It needs TWO things from the rest of the ecosystem, both reached over the
# shared `pcs` network:
#   1. the **Prowlarr** app (container `prowlarr:9696`) — the indexer source
#   2. the shared **MetaCore** app (`metacore-app:9000`) — where resolved
#      records + TMDB posters are stored; the shared **MetaShare** app then
#      announces them to the swarm.
# The **MetaGateway** app must list this feeder's URL
# (`http://metafeedertorznab-feeder:8080`) in its feeders config so it discovers
# + queries it (MetaGateway, MetaCore and this feeder all share the `pcs` net).
#
# Everything is scoped under the `metafeedertorznab-*` prefix + the per-stack
# `metafeedertorznab` network + /DATA/AppData/metafeedertorznab/ data root, so it
# installs alongside the other Meta* apps with zero collisions.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # metafeedertorznab-feeder — the torznab feeder (meta-feeder-torrent in torznab
  # mode). The gateway reaches it directly on `pcs` for discovery/query/compute;
  # the human configures it through the AppShield gate below.
  # ---------------------------------------------------------------------------
  metafeedertorznab-feeder:
    image: ghcr.io/worph/meta-feeder-torrent:1.0.3
    container_name: metafeedertorznab-feeder
    hostname: metafeedertorznab-feeder
    restart: unless-stopped
    user: "0:0"
    expose:
      - 8080
    environment:
      # UI-FIRST: all operator config (indexers + Prowlarr key, TMDB token /
      # language, meta-core URL) is set in this feeder's own config page behind
      # the AppShield gate below — NOT here. config.json (persisted to the state
      # volume) is the source of truth; env is only a deprecated first-boot seed.
      # The wiring that used to live here is now derived: the bundled
      # filename-parser / tmdb sidecars from the feeder's hostname prefix, the
      # callback from self, the peer id kept explicit (analytics group by it),
      # and meta-core defaults to the pcs `http://metacore-app:9000`.
      RUST_LOG: "info,meta_feeder=info"
      META_TORRENT_SOURCES: "torznab"
      META_GATEWAY_PEER_ID: "metafeedertorznab"
      META_FEEDER_STATE_DIR: "/data/meta-feeder"
      # Streaming-page override (code default is 100; 20 streams results in
      # smaller pages). Tuning — a future feeder-UI field will absorb it.
      META_GATEWAY_TORZNAB_PAGE_SIZE: "20"
      TZ: "$TZ"
    volumes:
      # Persist feeder config (config.json saved via the config UI) + redb cache.
      # Transient librqbit downloads go to the container's /tmp (off backup).
      - /DATA/AppData/metafeedertorznab/state:/data/meta-feeder:rw
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    depends_on:
      # service_started (not _healthy): the plugin images ship no healthcheck.
      metafeedertorznab-filename-parser:
        condition: service_started
      metafeedertorznab-tmdb:
        condition: service_started
    networks:
      - metafeedertorznab
      - pcs

  # ---------------------------------------------------------------------------
  # Bundled enrichment plugins (self-contained). filename-parser per file; tmdb
  # once per torrent — tmdb writes posters/backdrops to the gateway core's WebDAV.
  # No healthcheck: these plugin images don't ship one (curl absent).
  # ---------------------------------------------------------------------------
  metafeedertorznab-filename-parser:
    image: ghcr.io/worph/metamesh-plugin-filename-parser:1.0.1
    container_name: metafeedertorznab-filename-parser
    hostname: metafeedertorznab-filename-parser
    restart: unless-stopped
    expose:
      - 8080
    environment:
      PORT: "8080"
      EMIT_TITLE_TAGS: "true"
    networks:
      - metafeedertorznab

  metafeedertorznab-tmdb:
    image: ghcr.io/worph/metamesh-plugin-tmdb:1.0.0
    container_name: metafeedertorznab-tmdb
    hostname: metafeedertorznab-tmdb
    restart: unless-stopped
    expose:
      - 8080
    environment:
      PORT: "8080"
      CACHE_DIR: "/cache"
      # Posters land in the gateway core (over pcs) so the ingester seeds them.
      WEBDAV_URL: "http://metacore-app:9000/webdav"
    volumes:
      - /DATA/AppData/metafeedertorznab/tmdb-cache:/cache
    networks:
      - metafeedertorznab
      - pcs

  # ---------------------------------------------------------------------------
  # AppShield gate — the feeder's config UI (set the Prowlarr key / TMDB token,
  # toggle options) behind Yundera OIDC SSO. container_name == subdomain prefix.
  # The gateway still reaches the feeder directly on `pcs` (this gate is for the
  # human only); index → /config.
  # ---------------------------------------------------------------------------
  metafeedertorznab:
    image: ghcr.io/yundera/appshield:2.0.3
    container_name: metafeedertorznab
    hostname: metafeedertorznab
    restart: unless-stopped
    user: "0:0"
    expose:
      - 80
    environment:
      OIDC_REGISTRAR_URL: "http://auth-registrar:9092"
      REDIRECT_HOST_SUFFIXES: "${APP_DOMAIN},${APP_PUBLIC_IP_DASH}.nip.io,${APP_PUBLIC_IP_DASH}.sslip.io"
      CREDENTIAL_VALIDATE_URL: "http://casaos-oidc-bridge:8090/validate"
      BACKEND_HOST: "metafeedertorznab-feeder"
      BACKEND_PORT: "8080"
      LISTEN_PORT: "80"
    labels:
      caddy_0: metafeedertorznab-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 80}}"
      caddy_1: metafeedertorznab-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 80}}"
      caddy_2: metafeedertorznab-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 80}}"
    depends_on:
      - metafeedertorznab-feeder
    networks:
      - metafeedertorznab
      - pcs

networks:
  metafeedertorznab:
    name: metafeedertorznab
  pcs:
    name: pcs
    external: true

x-casaos:
  architectures:
    - amd64
    - arm64
  author: Worph Team
  category: Media
  developer: Aptero Team
  main: metafeedertorznab
  webui_port: 80
  index: /config

  description:
    en_us: |
      **A standalone Torznab/Prowlarr feeder for the MetaMesh network.**

      MetaFeeder · Torznab bridges your **Prowlarr** indexers into MetaMesh so
      they surface in **MetaWatch**. It's the torrent-indexer source, split out of
      MetaGateway so you can run only the feeders you want.

      **Self-contained:** ships its own filename-parser + TMDB enrichment, so each
      release gets a clean title, poster and plot.

      **Requires (both from the store):**
      - **Prowlarr** — the indexer app this feeds from (reached as `prowlarr` on
        the shared network).
      - **MetaGateway** — its meta-core stores the resolved records and announces
        them to the swarm. The gateway must list this feeder in its config.

    fr_fr: |
      **Un feeder Torznab/Prowlarr autonome pour le réseau MetaMesh.**

      MetaFeeder · Torznab connecte vos indexeurs **Prowlarr** à MetaMesh pour
      qu'ils apparaissent dans **MetaWatch**. C'est la source d'indexeurs torrent,
      détachée de MetaGateway pour n'exécuter que les feeders souhaités.

      **Autonome :** embarque ses propres plugins filename-parser + TMDB.

      **Nécessite (depuis le store) :** l'app **Prowlarr** (la source) et l'app
      **MetaGateway** (son meta-core stocke et annonce les enregistrements).

  tagline:
    en_us: Standalone Prowlarr/Torznab feeder for the MetaMesh network
    fr_fr: Feeder Prowlarr/Torznab autonome pour le réseau MetaMesh

  title:
    en_us: MetaFeeder · Torznab

  icon: https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaFeederTorznab/icon.png
  thumbnail: https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaFeederTorznab/thumbnail.png

  store_app_id: metafeedertorznab
  is_uncontrolled: false

  tips:
    before_install:
      en_us: |
        **Install order:** install **Prowlarr** and **MetaGateway** first.

        **After installing this app:**
        1. In **Prowlarr**, complete the first-run wizard and add one or more
           indexers, then copy the **API Key** (Settings → General).
        2. Open this app's config UI (the dashboard link) and paste the Prowlarr
           key into the indexer's API-key field; optionally set a TMDB v4 token
           for posters. Save — the feeder reloads automatically.
        3. In **MetaGateway**, make sure this feeder is listed in its feeders
           config (`http://metafeedertorznab-feeder:8080`) so it gets discovered.

        **Authentication:** the config UI is protected by Yundera's Authelia (OIDC).

  pre-install-cmd: |
    mkdir -p /DATA/AppData/metafeedertorznab/state
    mkdir -p /DATA/AppData/metafeedertorznab/tmdb-cache
