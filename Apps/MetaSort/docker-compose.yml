name: metasort

services:
  metasort:
    image: ghcr.io/worph/meta-sort:1.0.2
    container_name: metasort
    restart: unless-stopped
    cpu_shares: 20

    # Internal-only — public access goes through metasort-proxy.
    expose:
      - 80

    volumes:
      # Shared infrastructure state (leader election, Redis dump, service discovery)
      # Owned by MetaCore; mounted rw here for service registration + leader reads.
      - /DATA/AppData/metacore/meta-core:/meta-core:rw

      # Application cache storage
      - /DATA/AppData/metasort/cache:/data/cache

      # Docker socket for container plugin management
      - /var/run/docker.sock:/var/run/docker.sock:ro

    # Note: no /files mounts — files are accessed via WebDAV from MetaCore
    # (Architecture V3). MetaCore is the single source of truth for media files.

    environment:
      - NODE_ENV=production
      - META_CORE_PATH=/meta-core
      - CACHE_FOLDER_PATH=/data/cache
      - SERVICE_NAME=meta-sort
      - SERVICE_VERSION=1.0.0
      - BASE_URL=https://metasort-$APP_DOMAIN
      - TMDB_API_KEY=
      - TMDB_LANGUAGE=en-US
      - TZ=$TZ
      # Container plugin configuration
      - CONTAINER_CALLBACK_URL=http://metasort/api/plugins/callback
      - CONTAINER_NETWORK=pcs

    # Note: Runs as root for nginx, Redis, and file management
    user: 0:0

    networks:
      - pcs

  # OIDC perimeter for the MetaSort dashboard. Self-registers as an OIDC client
  # with the platform's auth-registrar on first login (no secrets to manage).
  # Public Caddy ingress attaches HERE; backend `metasort` stays on the internal
  # pcs network only.
  metasort-proxy:
    image: ghcr.io/yundera/nginx-hash-lock:1.0.7
    container_name: metasort-proxy
    hostname: metasort-proxy
    restart: unless-stopped
    user: "0:0"

    expose:
      - 80

    environment:
      OIDC_REGISTRAR_URL: "http://auth-registrar:9092"
      BACKEND_HOST: "metasort"
      BACKEND_PORT: "80"
      LISTEN_PORT: "80"

    depends_on:
      - metasort

    labels:
      # ---- metasort-${APP_DOMAIN} (gateway TLS) ----
      caddy_0: metasort-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      # Unauthenticated paths bypass the hash-lock proxy and hit the backend directly.
      caddy_0.0_handle: "/health"
      caddy_0.0_handle.reverse_proxy: "metasort:80"
      caddy_0.1_handle: "/webdav/*"
      caddy_0.1_handle.reverse_proxy: "metasort:80"
      caddy_0.2_handle: "/meta/*"
      caddy_0.2_handle.reverse_proxy: "metasort:80"
      caddy_0.3_handle: "/meta-health"
      caddy_0.3_handle.reverse_proxy: "metasort:80"
      caddy_0.4_handle: "/file/cid"
      caddy_0.4_handle.reverse_proxy: "metasort:80"
      caddy_0.5_handle: "/api/plugins/callback*"
      caddy_0.5_handle.reverse_proxy: "metasort:80"
      caddy_0.6_handle: ""
      caddy_0.6_handle.reverse_proxy: "{{upstreams 80}}"

      # ---- metasort-IP.nip.io (gateway TLS) ----
      caddy_1: metasort-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.0_handle: "/health"
      caddy_1.0_handle.reverse_proxy: "metasort:80"
      caddy_1.1_handle: "/webdav/*"
      caddy_1.1_handle.reverse_proxy: "metasort:80"
      caddy_1.2_handle: "/meta/*"
      caddy_1.2_handle.reverse_proxy: "metasort:80"
      caddy_1.3_handle: "/meta-health"
      caddy_1.3_handle.reverse_proxy: "metasort:80"
      caddy_1.4_handle: "/file/cid"
      caddy_1.4_handle.reverse_proxy: "metasort:80"
      caddy_1.5_handle: "/api/plugins/callback*"
      caddy_1.5_handle.reverse_proxy: "metasort:80"
      caddy_1.6_handle: ""
      caddy_1.6_handle.reverse_proxy: "{{upstreams 80}}"

      # ---- metasort-IP.sslip.io (Let's Encrypt) ----
      caddy_2: metasort-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.0_handle: "/health"
      caddy_2.0_handle.reverse_proxy: "metasort:80"
      caddy_2.1_handle: "/webdav/*"
      caddy_2.1_handle.reverse_proxy: "metasort:80"
      caddy_2.2_handle: "/meta/*"
      caddy_2.2_handle.reverse_proxy: "metasort:80"
      caddy_2.3_handle: "/meta-health"
      caddy_2.3_handle.reverse_proxy: "metasort:80"
      caddy_2.4_handle: "/file/cid"
      caddy_2.4_handle.reverse_proxy: "metasort:80"
      caddy_2.5_handle: "/api/plugins/callback*"
      caddy_2.5_handle.reverse_proxy: "metasort:80"
      caddy_2.6_handle: ""
      caddy_2.6_handle.reverse_proxy: "{{upstreams 80}}"

    networks:
      - pcs

networks:
  pcs:
    name: pcs
    external: true

x-casaos:
  architectures:
    - amd64
    - arm64
  author: Worph Team
  category: Media
  developer: Aptero Team

  description:
    en_us: |
      **Smart metadata extraction and file indexing for massive media libraries.**

      MetaSort is the brain of the MetaMesh ecosystem. It watches your media folders, extracts metadata using intelligent plugins, and stores everything in a distributed database for other services to use.

      **Key Features:**
      - **Plugin-Based Processing** - Containerized plugins for FFmpeg analysis, TMDB enrichment, filename parsing, and more
      - **Smart Metadata Extraction** - Automatically extracts titles, seasons, episodes, quality, language, codecs
      - **Duplicate Detection** - Finds exact duplicates and different quality versions of the same content
      - **Real-time Monitoring** - Watches folders and instantly processes new files
      - **Built for Scale** - Handles collections up to 900k+ files and 100TB+
      - **Leader Election** - Distributed architecture with automatic failover

      **Requires:** MetaCore (install first)

      **Works with:** MetaFuse (virtual filesystem), MetaStremio (streaming)

      **Dashboard Features:** File monitoring, plugin status, duplicate detection, metadata browser, processing queue

    fr_fr: |
      **Extraction intelligente de metadonnees et indexation de fichiers pour d'immenses bibliotheques multimedia.**

      MetaSort est le cerveau de l'ecosysteme MetaMesh. Il surveille vos dossiers multimedia, extrait les metadonnees a l'aide de plugins intelligents et stocke tout dans une base de donnees distribuee.

      **Fonctionnalites Cles:**
      - **Traitement par Plugins** - Plugins conteneurises pour analyse FFmpeg, enrichissement TMDB, parsing de noms de fichiers
      - **Extraction Intelligente** - Extrait automatiquement titres, saisons, episodes, qualite, langue, codecs
      - **Detection de Doublons** - Trouve les doublons exacts et differentes versions de qualite
      - **Surveillance Temps Reel** - Surveille les dossiers et traite instantanement les nouveaux fichiers
      - **Concu pour l'Echelle** - Gere des collections jusqu'a 900k+ fichiers et 100TB+

      **Necessite:** MetaCore (installer en premier)

      **Fonctionne avec:** MetaFuse (systeme de fichiers virtuel), MetaStremio (streaming)

  tagline:
    en_us: Smart metadata extraction engine - Index and organize massive media libraries with intelligent plugins
    fr_fr: Moteur d'extraction de metadonnees - Indexez et organisez d'immenses bibliotheques avec des plugins intelligents

  title:
    en_us: MetaSort

  icon: https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaSort/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaSort/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaSort/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaSort/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaSort/thumbnail.png

  index: /
  store_app_id: metasort
  main: metasort-proxy
  is_uncontrolled: false

  tips:
    before_install:
      en_us: |
        **Requires MetaCore** - Install MetaCore first.

        MetaSort connects to MetaCore for metadata storage. The dashboard is protected by
        Yundera's built-in Authelia via OIDC — sign in with your existing Yundera account.

  pre-install-cmd: |
    if [ ! -d /DATA/AppData/metacore/meta-core ]; then
      echo "ERROR: MetaCore must be installed before MetaSort." >&2 &&
      echo "Missing: /DATA/AppData/metacore/meta-core (install MetaCore first)" >&2 &&
      exit 1;
    fi
