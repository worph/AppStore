name: metacore

services:
  metacore:
    image: ghcr.io/worph/meta-core:1.0.0
    container_name: metacore
    hostname: metacore
    restart: unless-stopped
    privileged: true
    cpu_shares: 50

    # Internal-only — public access goes through metacore-proxy.
    expose:
      - 80

    volumes:
      # Shared infrastructure state (leader election, Redis dump, service discovery).
      # Lives inside /DATA/AppData/metacore/ so CasaOS archives it on uninstall.
      - /DATA/AppData/metacore/meta-core:/meta-core:rw

      # User's media directories — bind-mounted directly (no parent named volume,
      # so `docker volume rm` cannot recurse into these and wipe host data).
      - /DATA/Downloads:/files/watch/downloads:ro
      - /DATA/Media:/files/watch/media:ro

      # Application cache storage
      - /DATA/AppData/metacore/cache:/data/cache

    environment:
      - META_CORE_PATH=/meta-core
      - FILES_PATH=/files
      - SERVICE_NAME=meta-core
      - SERVICE_VERSION=1.0.0
      - META_CORE_HTTP_PORT=9000
      - META_CORE_HTTP_HOST=0.0.0.0
      - REDIS_PORT=6379
      - BASE_URL=https://metacore-$APP_DOMAIN
      - ENABLE_FILE_WATCHER=true
      - WATCH_INTERVAL_MS=1000
      - TZ=$TZ

    # Runs as root for nginx, Redis, rclone mounts
    user: 0:0

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    networks:
      - pcs

  # OIDC perimeter for the MetaCore dashboard. Self-registers as an OIDC client
  # with the platform's auth-registrar on first login (no secrets to manage).
  # Public Caddy ingress attaches HERE; backend `metacore` stays on the internal
  # pcs network only.
  metacore-proxy:
    image: ghcr.io/yundera/nginx-hash-lock:1.0.7
    container_name: metacore-proxy
    hostname: metacore-proxy
    restart: unless-stopped
    user: "0:0"

    expose:
      - 80

    environment:
      OIDC_REGISTRAR_URL: "http://auth-registrar:9092"
      BACKEND_HOST: "metacore"
      BACKEND_PORT: "80"
      LISTEN_PORT: "80"

    depends_on:
      - metacore

    labels:
      # ---- metacore-${APP_DOMAIN} (gateway TLS) ----
      caddy_0: metacore-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      # Unauthenticated paths bypass the hash-lock proxy and hit the backend directly.
      caddy_0.0_handle: "/health"
      caddy_0.0_handle.reverse_proxy: "metacore:80"
      caddy_0.1_handle: "/webdav/*"
      caddy_0.1_handle.reverse_proxy: "metacore:80"
      caddy_0.2_handle: "/meta/*"
      caddy_0.2_handle.reverse_proxy: "metacore:80"
      caddy_0.3_handle: "/file/cid"
      caddy_0.3_handle.reverse_proxy: "metacore:80"
      caddy_0.4_handle: ""
      caddy_0.4_handle.reverse_proxy: "{{upstreams 80}}"

      # ---- metacore-IP.nip.io (gateway TLS) ----
      caddy_1: metacore-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.0_handle: "/health"
      caddy_1.0_handle.reverse_proxy: "metacore:80"
      caddy_1.1_handle: "/webdav/*"
      caddy_1.1_handle.reverse_proxy: "metacore:80"
      caddy_1.2_handle: "/meta/*"
      caddy_1.2_handle.reverse_proxy: "metacore:80"
      caddy_1.3_handle: "/file/cid"
      caddy_1.3_handle.reverse_proxy: "metacore:80"
      caddy_1.4_handle: ""
      caddy_1.4_handle.reverse_proxy: "{{upstreams 80}}"

      # ---- metacore-IP.sslip.io (Let's Encrypt) ----
      caddy_2: metacore-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.0_handle: "/health"
      caddy_2.0_handle.reverse_proxy: "metacore:80"
      caddy_2.1_handle: "/webdav/*"
      caddy_2.1_handle.reverse_proxy: "metacore:80"
      caddy_2.2_handle: "/meta/*"
      caddy_2.2_handle.reverse_proxy: "metacore:80"
      caddy_2.3_handle: "/file/cid"
      caddy_2.3_handle.reverse_proxy: "metacore:80"
      caddy_2.4_handle: ""
      caddy_2.4_handle.reverse_proxy: "{{upstreams 80}}"

    networks:
      - pcs

networks:
  pcs:
    name: pcs
    external: true

x-casaos:
  architectures:
    - amd64
    - arm64
  author: Worph Team
  category: Media
  developer: Aptero Team

  description:
    en_us: |
      **The infrastructure foundation for the MetaMesh media management ecosystem.**

      MetaCore provides the shared services that power all MetaMesh applications: distributed leader election, Redis database, WebDAV file serving, remote mount management, and service discovery.

      **Key Features:**
      - **Leader Election** - Automatic flock-based leader election with failover support
      - **Redis Database** - Centralized metadata storage for all MetaMesh services
      - **WebDAV File Serving** - Cached file access for all services via HTTP
      - **Mount Management** - Add NFS, SMB, and rclone remote mounts from the dashboard
      - **File Watcher** - Monitors folders and notifies services of new files
      - **Metadata Editor** - Browse and edit file metadata stored in Redis
      - **Service Discovery** - Automatic registration and discovery of MetaMesh services
      - **OIDC Single Sign-On** - Dashboard protected by Yundera's built-in Authelia (auto-registered, no secrets to configure)

      **Install this FIRST** before MetaSort, MetaFuse, or MetaStremio.

      **Dashboard Features:** Service health, file watchers, mount management, metadata editor, KV browser

    fr_fr: |
      **La fondation d'infrastructure pour l'ecosysteme de gestion de medias MetaMesh.**

      MetaCore fournit les services partages qui alimentent toutes les applications MetaMesh : election de leader distribuee, base de donnees Redis, service de fichiers WebDAV, gestion de montages distants et decouverte de services.

      **Fonctionnalites Cles:**
      - **Election de Leader** - Election automatique basee sur flock avec support de basculement
      - **Base de Donnees Redis** - Stockage centralise des metadonnees pour tous les services
      - **Service de Fichiers WebDAV** - Acces aux fichiers en cache via HTTP
      - **Gestion des Montages** - Ajout de montages NFS, SMB et rclone depuis le tableau de bord
      - **Surveillance de Fichiers** - Surveille les dossiers et notifie les services des nouveaux fichiers
      - **Editeur de Metadonnees** - Parcourir et editer les metadonnees stockees dans Redis
      - **Decouverte de Services** - Enregistrement et decouverte automatiques des services
      - **SSO OIDC** - Tableau de bord protege par l'Authelia integre de Yundera (auto-enregistre, aucun secret a configurer)

      **Installez ceci EN PREMIER** avant MetaSort, MetaFuse ou MetaStremio.

  tagline:
    en_us: MetaMesh infrastructure - Leader election, Redis, WebDAV, and service discovery
    fr_fr: Infrastructure MetaMesh - Election de leader, Redis, WebDAV et decouverte de services

  title:
    en_us: MetaCore

  icon: https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaCore/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaCore/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaCore/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaCore/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaCore/thumbnail.png

  index: /
  store_app_id: metacore
  main: metacore
  is_uncontrolled: false

  tips:
    before_install:
      en_us: |
        **MetaCore is the foundation for the MetaMesh ecosystem.**

        Install this FIRST before MetaSort, MetaFuse, or MetaStremio.

        **Authentication:** The dashboard is protected by Yundera's built-in Authelia via OIDC.
        Sign in with your existing Yundera account when you open the dashboard for the first time.

        **After installation:**
        1. Open the dashboard at `https://metacore-$APP_DOMAIN/`
        2. Sign in via the Authelia portal that appears
        3. Install MetaSort, MetaFuse, or MetaStremio as needed

  pre-install-cmd: |
    mkdir -p /DATA/AppData/metacore/meta-core
