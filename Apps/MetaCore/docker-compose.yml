name: metacore

services:
  metacore:
    image: ghcr.io/worph/meta-core:1.0.0
    container_name: metacore
    hostname: metacore
    restart: unless-stopped
    privileged: true
    cpu_shares: 50

    expose:
      - 80

    volumes:
      # Shared infrastructure volume (leader election, service discovery, Redis)
      - /DATA/Apps/MetaCore:/meta-core:rw

      # Shared files volume (root for all file access)
      - metamesh-files:/files:rw

      # User's media directories mounted into the files volume
      - /DATA/Downloads:/files/watch/downloads:ro
      - /DATA/Media:/files/watch/media:ro

      # Application cache storage
      - /DATA/AppData/metacore/cache:/data/cache

    environment:
      - META_CORE_PATH=/meta-core
      - FILES_PATH=/files
      - SERVICE_NAME=meta-core
      - SERVICE_VERSION=1.0.0
      - META_CORE_HTTP_PORT=9000
      - META_CORE_HTTP_HOST=0.0.0.0
      - REDIS_PORT=6379
      - BASE_URL=https://metacore-$APP_DOMAIN
      - ENABLE_FILE_WATCHER=true
      - WATCH_INTERVAL_MS=1000
      - TZ=$TZ

    # Runs as root for nginx, Redis, rclone mounts
    user: 0:0

    labels:
      # ---- metacore-${APP_DOMAIN} (gateway TLS) ----
      caddy_0: metacore-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.0_handle: "/health"
      caddy_0.0_handle.reverse_proxy: "{{upstreams 80}}"
      caddy_0.1_handle: "/webdav/*"
      caddy_0.1_handle.reverse_proxy: "{{upstreams 80}}"
      caddy_0.2_handle: "/meta/*"
      caddy_0.2_handle.reverse_proxy: "{{upstreams 80}}"
      caddy_0.3_handle: "/file/cid"
      caddy_0.3_handle.reverse_proxy: "{{upstreams 80}}"
      caddy_0.4_handle: ""
      caddy_0.4_handle.reverse_proxy: "metacore-oauth:4180"

      # ---- metacore-IP.nip.io (gateway TLS) ----
      caddy_1: metacore-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.0_handle: "/health"
      caddy_1.0_handle.reverse_proxy: "{{upstreams 80}}"
      caddy_1.1_handle: "/webdav/*"
      caddy_1.1_handle.reverse_proxy: "{{upstreams 80}}"
      caddy_1.2_handle: "/meta/*"
      caddy_1.2_handle.reverse_proxy: "{{upstreams 80}}"
      caddy_1.3_handle: "/file/cid"
      caddy_1.3_handle.reverse_proxy: "{{upstreams 80}}"
      caddy_1.4_handle: ""
      caddy_1.4_handle.reverse_proxy: "metacore-oauth:4180"

      # ---- metacore-IP.sslip.io (Let's Encrypt) ----
      caddy_2: metacore-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.0_handle: "/health"
      caddy_2.0_handle.reverse_proxy: "{{upstreams 80}}"
      caddy_2.1_handle: "/webdav/*"
      caddy_2.1_handle.reverse_proxy: "{{upstreams 80}}"
      caddy_2.2_handle: "/meta/*"
      caddy_2.2_handle.reverse_proxy: "{{upstreams 80}}"
      caddy_2.3_handle: "/file/cid"
      caddy_2.3_handle.reverse_proxy: "{{upstreams 80}}"
      caddy_2.4_handle: ""
      caddy_2.4_handle.reverse_proxy: "metacore-oauth:4180"

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    networks:
      - metamesh
      - pcs

  meta-authelia:
    image: authelia/authelia:4.39
    container_name: meta-authelia
    hostname: meta-authelia
    restart: unless-stopped

    expose:
      - 9091

    volumes:
      - /DATA/AppData/metacore/authelia:/config

    environment:
      AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET_FILE: /config/secrets/jwt
      AUTHELIA_SESSION_SECRET_FILE: /config/secrets/session
      AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE: /config/secrets/encryption

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9091/api/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

    labels:
      # Authelia portal UI
      caddy_0: auth-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 9091}}"
      caddy_1: auth-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 9091}}"
      caddy_2: auth-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 9091}}"

    networks:
      - metamesh
      - pcs

  # OIDC sidecar — terminates Authorization Code flow for the MetaCore dashboard.
  # Holds a cookie scoped to metacore-${APP_DOMAIN} only (host cookie, no sibling-
  # domain problem). Forwards authenticated traffic to the metacore app.
  metacore-oauth:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.11.0
    container_name: metacore-oauth
    hostname: metacore-oauth
    restart: unless-stopped

    depends_on:
      meta-authelia:
        condition: service_healthy

    expose:
      - 4180

    volumes:
      - /DATA/AppData/metacore/authelia/secrets:/secrets:ro

    command:
      - --provider=oidc
      - --oidc-issuer-url=https://auth-${APP_DOMAIN}
      - --client-id=metacore
      - --client-secret-file=/secrets/client-metacore.plain
      - --cookie-secret-file=/secrets/cookie-metacore.secret
      - --cookie-domain=metacore-${APP_DOMAIN}
      - --whitelist-domain=metacore-${APP_DOMAIN}
      - --redirect-url=https://metacore-${APP_DOMAIN}/oauth2/callback
      - --upstream=http://metacore:80
      - --http-address=0.0.0.0:4180
      - --email-domain=*
      - --reverse-proxy=true
      - --pass-access-token=true
      - --set-xauthrequest=true
      - --skip-provider-button=true

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4180/ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

    networks:
      - metamesh
      - pcs

volumes:
  metamesh-files:
    name: metamesh-files
    driver: local

networks:
  metamesh:
    name: metamesh
    driver: bridge
  pcs:
    name: pcs
    external: true

x-casaos:
  architectures:
    - amd64
    - arm64
  author: Worph Team
  category: Media
  developer: Aptero Team

  description:
    en_us: |
      **The infrastructure foundation for the MetaMesh media management ecosystem.**

      MetaCore provides the shared services that power all MetaMesh applications: distributed leader election, Redis database, WebDAV file serving, remote mount management, and Authelia authentication.

      **Key Features:**
      - **Leader Election** - Automatic flock-based leader election with failover support
      - **Redis Database** - Centralized metadata storage for all MetaMesh services
      - **WebDAV File Serving** - Cached file access for all services via HTTP
      - **Mount Management** - Add NFS, SMB, and rclone remote mounts from the dashboard
      - **File Watcher** - Monitors folders and notifies services of new files
      - **Metadata Editor** - Browse and edit file metadata stored in Redis
      - **Service Discovery** - Automatic registration and discovery of MetaMesh services
      - **Authelia Authentication** - Single sign-on portal protecting all MetaMesh dashboards

      **Install this FIRST** before MetaSort, MetaFuse, or MetaStremio.

      **Dashboard Features:** Service health, file watchers, mount management, metadata editor, KV browser

    fr_fr: |
      **La fondation d'infrastructure pour l'ecosysteme de gestion de medias MetaMesh.**

      MetaCore fournit les services partages qui alimentent toutes les applications MetaMesh : election de leader distribuee, base de donnees Redis, service de fichiers WebDAV, gestion de montages distants et authentification Authelia.

      **Fonctionnalites Cles:**
      - **Election de Leader** - Election automatique basee sur flock avec support de basculement
      - **Base de Donnees Redis** - Stockage centralise des metadonnees pour tous les services
      - **Service de Fichiers WebDAV** - Acces aux fichiers en cache via HTTP
      - **Gestion des Montages** - Ajout de montages NFS, SMB et rclone depuis le tableau de bord
      - **Surveillance de Fichiers** - Surveille les dossiers et notifie les services des nouveaux fichiers
      - **Editeur de Metadonnees** - Parcourir et editer les metadonnees stockees dans Redis
      - **Decouverte de Services** - Enregistrement et decouverte automatiques des services
      - **Authentification Authelia** - Portail SSO protégeant tous les tableaux de bord MetaMesh

      **Installez ceci EN PREMIER** avant MetaSort, MetaFuse ou MetaStremio.

  tagline:
    en_us: MetaMesh infrastructure - Leader election, Redis, WebDAV, authentication, and service discovery
    fr_fr: Infrastructure MetaMesh - Election de leader, Redis, WebDAV, authentification et decouverte de services

  title:
    en_us: MetaCore

  icon: https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaCore/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaCore/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaCore/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaCore/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaCore/thumbnail.png

  index: /
  store_app_id: metacore
  main: metacore
  is_uncontrolled: false

  tips:
    before_install:
      en_us: |
        **MetaCore is the foundation for the MetaMesh ecosystem.**

        Install this FIRST before MetaSort, MetaFuse, or MetaStremio.

        **Default login:** admin / `$APP_DEFAULT_PASSWORD`

        **Authentication Portal:** `https://auth-$APP_DOMAIN/`

        **After installation:**
        1. Access the dashboard at `https://metacore-$APP_DOMAIN/`
        2. Log in with the default credentials above
        3. Install MetaSort, MetaFuse, or MetaStremio as needed

  pre-install-cmd: |
    mkdir -p /DATA/AppData/metacore/authelia/secrets /DATA/Apps/MetaCore &&
    SECRETS=/DATA/AppData/metacore/authelia/secrets &&
    CFG=/DATA/AppData/metacore/authelia/configuration.yml &&
    USERS=/DATA/AppData/metacore/authelia/users_database.yml &&
    [ -f "$SECRETS/jwt" ] || openssl rand -hex 32 > "$SECRETS/jwt" &&
    [ -f "$SECRETS/session" ] || openssl rand -hex 32 > "$SECRETS/session" &&
    [ -f "$SECRETS/encryption" ] || openssl rand -hex 32 > "$SECRETS/encryption" &&
    [ -f "$SECRETS/oidc-hmac" ] || openssl rand -hex 64 > "$SECRETS/oidc-hmac" &&
    { [ -f "$SECRETS/oidc-jwks.pem" ] || openssl genrsa -out "$SECRETS/oidc-jwks.pem" 4096 2>/dev/null; } &&
    for name in metacore metasort metafuse; do
      [ -f "$SECRETS/client-$name.plain" ] || openssl rand -hex 32 | tr -d '\n' > "$SECRETS/client-$name.plain";
      if [ ! -f "$SECRETS/client-$name.hash" ]; then
        P=$(cat "$SECRETS/client-$name.plain");
        docker run --rm authelia/authelia:4.39 authelia crypto hash generate argon2 --password "$P" 2>/dev/null | grep 'Digest:' | awk '{print $2}' > "$SECRETS/client-$name.hash";
      fi;
      [ -f "$SECRETS/cookie-$name.secret" ] || openssl rand -hex 16 | tr -d '\n' > "$SECRETS/cookie-$name.secret";
    done &&
    if [ ! -f "$USERS" ]; then
      wget -q https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaCore/pre-install/users_database.yml -O "$USERS" &&
      USER_HASH=$(docker run --rm authelia/authelia:4.39 authelia crypto hash generate argon2 --password "$APP_DEFAULT_PASSWORD" 2>/dev/null | grep 'Digest:' | awk '{print $2}') &&
      awk -v hash="$USER_HASH" '{gsub(/__PASSWORD_HASH__/, hash); print}' "$USERS" > /tmp/users_db.tmp &&
      mv /tmp/users_db.tmp "$USERS";
    fi &&
    wget -q https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaCore/pre-install/configuration.yml -O "$CFG" &&
    HMAC=$(cat "$SECRETS/oidc-hmac") &&
    CH_MC=$(cat "$SECRETS/client-metacore.hash") &&
    CH_MS=$(cat "$SECRETS/client-metasort.hash") &&
    CH_MF=$(cat "$SECRETS/client-metafuse.hash") &&
    JWKS_KEY=$(sed 's/^/          /' "$SECRETS/oidc-jwks.pem") &&
    sed -i "s|__AUTH_DOMAIN__|${APP_DOMAIN}|g; s|__APP_PUBLIC_IP_DASH__|${APP_PUBLIC_IP_DASH}|g" "$CFG" &&
    awk -v hmac="$HMAC" -v cm="$CH_MC" -v cs="$CH_MS" -v cf="$CH_MF" -v key="$JWKS_KEY" '{
      gsub(/__OIDC_HMAC__/, hmac);
      gsub(/__CLIENT_METACORE_HASH__/, cm);
      gsub(/__CLIENT_METASORT_HASH__/, cs);
      gsub(/__CLIENT_METAFUSE_HASH__/, cf);
      gsub(/__OIDC_JWKS_KEY__/, key);
      print
    }' "$CFG" > /tmp/cfg.tmp &&
    mv /tmp/cfg.tmp "$CFG"
