  tips:
    before_install:
      en_us: |
        **Getting Started**

        n8n MCP needs a running n8n instance and an API key.

        **Prerequisites:**
        1. Install the **n8n** app first (or have another reachable n8n instance)
        2. In n8n: **Settings → n8n API → Create an API key**

        **Setup (2 steps):**
        1. Open this app's Web UI (you'll be prompted for the `ADMIN` password `$APP_DEFAULT_PASSWORD`)
        2. Paste the **n8n Base URL** (`http://n8n:80` is pre-filled for the companion app) and the **API key**, click **Test connection** → **Save**

        **MCP Integration (for AI/LLMs):**

        **Option 1: Public URL (with hash auth)**
        ```json
        {
          "mcpServers": {
            "n8n-mcp": {
              "type": "http",
              "url": "https://n8nmcp-${APP_DOMAIN}/mcp?hash=${AUTH_HASH}"
            }
          }
        }
        ```

        **Option 2: Local Docker connection (no auth required)**

        For AI assistants running on the same server, connect directly via the Docker network:
        ```json
        {
          "mcpServers": {
            "n8n-mcp": {
              "type": "http",
              "url": "http://n8nmcp:9640/mcp"
            }
          }
        }
        ```
        *Note: Requires the AI assistant to be on the `pcs` Docker network.*

        **Option 3: Via Beacon (aggregated)**

        If you have **Beacon** installed, n8n MCP auto-registers there and its tools show up under the `n8n-mcp__*` namespace — no extra config.

        **Available MCP Tools:**
        | Tool | Description |
        |------|-------------|
        | `n8n_list_workflows` | List workflows (optionally filter by tag/active) |
        | `n8n_get_workflow` | Fetch a workflow by ID including nodes and connections |
        | `n8n_create_workflow` | Create a workflow from a JSON definition |
        | `n8n_update_full_workflow` | Replace a workflow's nodes/connections/settings |
        | `n8n_update_partial_workflow` | Apply diff operations (add/remove nodes, connections, activate, etc.) |
        | `n8n_delete_workflow` | Remove a workflow |
        | `n8n_test_workflow` | Trigger a webhook/form/chat workflow for testing |
        | `n8n_executions` | List, get, or delete executions |
        | `search_nodes` / `get_node` | Browse and inspect the n8n node catalog |
        | `validate_node` / `validate_workflow` | Validate configs before deployment |
        | `n8n_health_check` | Verify n8n API connectivity |

        **Security:**
        - The API key is stored only in `/DATA/AppData/n8nmcp/config.json` and is never logged or returned via the API
        - The Web UI sits behind the Yundera hash-lock — you'll need the admin password to access it
