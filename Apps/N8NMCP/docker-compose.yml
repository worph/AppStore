name: n8nmcp
services:
  # Main MCP server — reachable at n8nmcp:9640 on the pcs network
  n8nmcp:
    image: ghcr.io/worph/n8nmcp:1.0.0
    container_name: n8nmcp
    hostname: n8nmcp
    user: $PUID:$PGID
    restart: unless-stopped
    expose:
      - 9640
      - 9099
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      - PORT=9640
      - UPSTREAM_PORT=3000
      - DISCOVERY_PORT=9099
      - CONFIG_PATH=/app/data/config.json
      # Pre-seed the companion n8n app's in-network hostname.
      # The API key is left blank — paste it in the Web UI on first launch.
      - N8N_BASE_URL=http://n8n:80
    volumes:
      - type: bind
        source: /DATA/AppData/n8nmcp/
        target: /app/data
    networks:
      - pcs

  # Nginx-hash-lock provides perimeter authentication for the web UI
  n8nmcp-proxy:
    image: ghcr.io/yundera/nginx-hash-lock:1.0.5
    restart: unless-stopped
    cpu_shares: 50
    expose:
      - 80
    user: "root"
    environment:
      ALLOWED_PATHS: "mcp"
      AUTH_HASH: $AUTH_HASH
      BACKEND_HOST: n8nmcp
      BACKEND_PORT: "9640"
      LISTEN_PORT: "80"
      USER: "ADMIN"
      PASSWORD: $APP_DEFAULT_PASSWORD
    depends_on:
      - n8nmcp
    networks:
      - pcs
    labels:
      caddy_0: n8nmcp-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 80}}"
      caddy_1: n8nmcp-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 80}}"
      caddy_2: n8nmcp-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 80}}"

networks:
  pcs:
    name: pcs
    external: true

x-casaos:
  architectures:
    - amd64
    - arm64
  main: n8nmcp
  index: /?hash=$AUTH_HASH
  author: Aptero
  category: Developer
  description:
    en_us: |
      **n8n workflow control for AI assistants via MCP**

      n8n MCP exposes the [n8n](https://n8n.io) REST API as an MCP (Model Context Protocol) server, letting LLMs and AI assistants list, read, create, edit, activate, and execute n8n workflows — plus browse the full n8n node catalog. Wraps the upstream [`czlonkowski/n8n-mcp`](https://github.com/czlonkowski/n8n-mcp) server and adds a Web UI for API-key setup and Beacon auto-discovery.

      **What you can do:**
      - Manage workflows (create, update, delete, activate, execute) from any MCP-compatible AI assistant
      - List and inspect executions including per-node output
      - Search the n8n node catalog and fetch per-node schemas
      - Validate workflows before deployment
      - Configure the n8n connection via the built-in Web UI — no hand-editing files

      **Think of it like:** A programmable remote control for your n8n instance, driven by natural language.

      **Perfect if you:** Want Claude / Cursor / any MCP client to build and operate n8n automations for you, or to pair with other MCP apps (Beacon, Ntfy, Chronos) for end-to-end AI-driven workflows.
    fr_fr: |
      **Controle des workflows n8n pour les assistants IA via MCP**

      n8n MCP expose l'API REST de [n8n](https://n8n.io) en tant que serveur MCP (Model Context Protocol), permettant aux LLMs et assistants IA de lister, lire, creer, modifier, activer et executer des workflows n8n — et de parcourir le catalogue complet des nodes n8n. Enveloppe le serveur amont [`czlonkowski/n8n-mcp`](https://github.com/czlonkowski/n8n-mcp) et ajoute une interface Web pour la configuration de la cle API et la decouverte automatique via Beacon.

      **Ce que vous pouvez faire:**
      - Gerer les workflows (creer, modifier, supprimer, activer, executer) depuis tout assistant IA compatible MCP
      - Lister et inspecter les executions, y compris la sortie par node
      - Rechercher dans le catalogue des nodes n8n et consulter le schema de chaque node
      - Valider les workflows avant deploiement
      - Configurer la connexion n8n via l'interface Web integree — sans editer de fichiers

      **Parfait si vous:** Voulez que Claude / Cursor / tout client MCP construise et pilote vos automatisations n8n, ou combiner avec d'autres apps MCP (Beacon, Ntfy, Chronos) pour des workflows pilotes par IA de bout en bout.
