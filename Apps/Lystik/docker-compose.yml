name: lystik

services:
  lystik:
    image: ghcr.io/yundera/nginx-hash-lock:1.0.5
    container_name: lystik
    restart: unless-stopped
    expose:
      - 80
    labels:
      caddy_0: lystik-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 80}}"
      caddy_1: lystik-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 80}}"
      caddy_2: lystik-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 80}}"
    user: 0:0
    environment:
      AUTH_HASH: $AUTH_HASH
      BACKEND_HOST: "lystik-backend"
      BACKEND_PORT: "80"
      LISTEN_PORT: "80"
      USER: "ADMIN"
      PASSWORD: $APP_DEFAULT_PASSWORD
    depends_on:
      - lystik-backend
    networks:
      - pcs
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  lystik-backend:
    image: ghcr.io/worph/lystik:1.2.3
    container_name: lystik-backend
    restart: unless-stopped
    user: $PUID:$PGID
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      PORT: "80"
      DATA_DIR: /data
    volumes:
      - /DATA/AppData/lystik/data/:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - pcs
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

networks:
  pcs:
    name: pcs
    external: true

x-casaos:
  main: lystik
  webui_port: 80
  index: /

  icon: https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/Lystik/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/Lystik/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/Lystik/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/Lystik/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/Lystik/thumbnail.png

  architectures:
    - amd64
    - arm64
  author: Worph
  category: Utilities
  developer: Worph
  title:
    en_us: Lystik
  tagline:
    en_us: A minimal shared checkbox list
    fr_fr: Une liste de cases a cocher partagee minimale
  description:
    en_us: |
      **A minimal, single-list checkbox application designed for simplicity**

      Lystik is a lightweight shared checkbox list inspired by Google Keep. Perfect for quick to-do lists, shopping lists, or any simple checklist you want to share.

      **What you can do:**
      - Add and check off items with a clean, simple interface
      - Drag and drop to reorder items
      - Real-time sync across all connected browsers
      - Get web notifications when items are added or checked
      - Undo deletions with a quick snackbar action
      - Collapse completed items to focus on what's left

      **Think of it like:** A shared sticky note checklist that syncs instantly across all your devices.

      **Perfect if you:** Need a quick, no-frills shared list without accounts or complex setup.
    fr_fr: |
      **Une application de liste de cases a cocher minimale et simple**

      Lystik est une liste de cases a cocher legere et partagee inspiree de Google Keep. Parfait pour les listes de taches, les listes de courses ou toute liste simple que vous souhaitez partager.

      **Ce que vous pouvez faire:**
      - Ajouter et cocher des elements avec une interface simple
      - Glisser-deposer pour reorganiser les elements
      - Synchronisation en temps reel sur tous les navigateurs connectes
      - Notifications web lorsque des elements sont ajoutes ou coches
      - Annuler les suppressions avec une action rapide
      - Replier les elements termines pour se concentrer sur ce qui reste

      **Parfait si vous:** Avez besoin d'une liste partagee rapide et simple.
  tips:
    before_install:
      en_us: |
        **Getting Started**

        Lystik is ready to use immediately!

        **Authentication:**
        - **Username:** `ADMIN`
        - **Password:** `$APP_DEFAULT_PASSWORD`

        **How to use:**
        1. Type in the input field and press Enter to add items
        2. Click the checkbox to mark items as complete
        3. Drag items to reorder them
        4. Click the X to delete an item (you have 5 seconds to undo)
        5. Click "Enable Notifications" for real-time alerts

        **Features:**
        - All connected users see changes instantly via SSE
        - Completed items collapse into a separate section
        - No database needed - data stored as simple JSON

        **MCP Integration (for AI/LLMs):**

        Lystik includes a Model Context Protocol (MCP) endpoint that allows AI assistants to manage your list.

        **Option 1: Public URL (with hash auth)**
        ```json
        {
          "mcpServers": {
            "lystik": {
              "type": "http",
              "url": "https://lystik-${APP_DOMAIN}/mcp?hash=${AUTH_HASH}"
            }
          }
        }
        ```

        **Option 2: Local Docker connection (no auth required)**

        For AI assistants running on the same server, connect directly to the backend container via the Docker network, bypassing authentication:
        ```json
        {
          "mcpServers": {
            "lystik": {
              "type": "sse",
              "url": "http://lystik-backend:80/mcp"
            }
          }
        }
        ```
        *Note: Requires the AI assistant to be on the `pcs` Docker network.*

        **Transport types:** Both `http` and `sse` transports are supported.

        **Available MCP Tools:**
        | Tool | Description |
        |------|-------------|
        | `list_items` | Get all tasks |
        | `add_item` | Add a new task (param: `text`) |
        | `toggle_item` | Toggle checked state (param: `id`) |
        | `delete_item` | Delete a task (param: `id`) |

        **Tip:** This is a shared list - everyone with access sees the same items!
      fr_fr: |
        **Pour commencer**

        Lystik est pret a l'emploi immediatement!

        **Authentification:**
        - **Utilisateur:** `ADMIN`
        - **Mot de passe:** `$APP_DEFAULT_PASSWORD`

        **Comment utiliser:**
        1. Tapez dans le champ et appuyez sur Entree pour ajouter des elements
        2. Cliquez sur la case pour marquer comme termine
        3. Glissez les elements pour les reorganiser
        4. Cliquez sur X pour supprimer (5 secondes pour annuler)
        5. Cliquez sur "Activer les notifications" pour les alertes en temps reel

        **Integration MCP (pour IA/LLMs):**

        Lystik inclut un endpoint MCP permettant aux assistants IA de gerer votre liste.

        **Option 1: URL publique (avec hash auth)**
        ```json
        {
          "mcpServers": {
            "lystik": {
              "type": "http",
              "url": "https://lystik-${APP_DOMAIN}/mcp?hash=${AUTH_HASH}"
            }
          }
        }
        ```

        **Option 2: Connexion Docker locale (sans auth)**

        Pour les assistants IA sur le meme serveur, connectez-vous directement au conteneur backend via le reseau Docker:
        ```json
        {
          "mcpServers": {
            "lystik": {
              "type": "sse",
              "url": "http://lystik-backend:80/mcp"
            }
          }
        }
        ```
        *Note: L'assistant IA doit etre sur le reseau Docker `pcs`.*

        **Types de transport:** Les transports `http` et `sse` sont supportes.

        **Outils MCP disponibles:**
        | Outil | Description |
        |-------|-------------|
        | `list_items` | Obtenir toutes les taches |
        | `add_item` | Ajouter une tache (param: `text`) |
        | `toggle_item` | Basculer l'etat (param: `id`) |
        | `delete_item` | Supprimer une tache (param: `id`) |

        **Astuce:** C'est une liste partagee - tous les utilisateurs voient les memes elements!
