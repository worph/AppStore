name: docmostmcp
services:
  # Main MCP server — reachable at docmostmcp:8000 on the pcs network
  docmostmcp:
    image: ghcr.io/yundera/docmost-mcp:latest
    container_name: docmostmcp
    hostname: docmostmcp
    user: "0:0"
    restart: unless-stopped
    expose:
      - 8000
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      - PORT=8000
    volumes:
      # config.json (Docmost credentials) and token.json (cached JWT) live here.
      # The pre-install script seeds a template config.json on first install.
      - type: bind
        source: /DATA/AppData/docmostmcp/
        target: /data
    networks:
      - pcs

  # Beaconify sidecar — makes this MCP discoverable by the Beacon aggregator.
  # Proxies the upstream MCP and replies to Beacon's UDP discovery on port 9099.
  docmostmcp-beacon:
    image: ghcr.io/worph/beaconify:latest
    container_name: docmostmcp-beacon
    hostname: docmostmcp-beacon
    restart: unless-stopped
    cpu_shares: 20
    expose:
      - 9099
    environment:
      BEACONIFY_NAME: docmost-mcp
      BEACONIFY_DESCRIPTION: "Docmost MCP — read, write, search, and move pages in a self-hosted Docmost instance"
      BEACONIFY_UPSTREAM_URL: http://docmostmcp:8000/mcp
    depends_on:
      - docmostmcp
    networks:
      - pcs

  # Nginx-hash-lock provides perimeter authentication for the MCP endpoint
  docmostmcp-proxy:
    image: ghcr.io/yundera/nginx-hash-lock:1.0.5
    restart: unless-stopped
    cpu_shares: 50
    expose:
      - 80
    user: "root"
    environment:
      ALLOWED_PATHS: "mcp,sse,messages"
      AUTH_HASH: $AUTH_HASH
      BACKEND_HOST: docmostmcp
      BACKEND_PORT: "8000"
      LISTEN_PORT: "80"
      USER: "ADMIN"
      PASSWORD: $APP_DEFAULT_PASSWORD
    depends_on:
      - docmostmcp
    networks:
      - pcs
    labels:
      caddy_0: docmostmcp-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 80}}"
      caddy_1: docmostmcp-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 80}}"
      caddy_2: docmostmcp-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 80}}"

networks:
  pcs:
    name: pcs
    external: true

x-casaos:
  pre-install-cmd: docker run --rm -v /DATA/AppData/docmostmcp/:/data/ nasselle/pre-install-toolbox https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/DocmostMCP/pre-install/init.sh
  architectures:
    - amd64
    - arm64
  main: docmostmcp
  author: Aptero
  category: Developer
  description:
    en_us: |
      **Docmost knowledge base control for AI assistants via MCP**

      Docmost MCP exposes the [Docmost](https://docmost.com) REST API as an MCP (Model Context Protocol) server, letting LLMs and AI assistants list and search spaces, read pages, create and update content, move and duplicate pages, and manage comments — all against your self-hosted Docmost instance.

      Wraps the community [`aleksvin8888/local-docmost-mcp`](https://github.com/aleksvin8888/local-docmost-mcp) Python server with a streamable-HTTP transport shim so any MCP-compatible client can connect (Claude Desktop, Claude Code, Cursor, VS Code, etc.).

      **Think of it like:** A programmable remote control for your Docmost wiki, driven by natural language.

      **Perfect if you:** Have a self-hosted Docmost and want AI assistants to read from, write to, or maintain it without paying for Docmost's Enterprise plan (which is the only tier with built-in MCP support).
    fr_fr: |
      **Controle de base de connaissances Docmost pour les assistants IA via MCP**

      Docmost MCP expose l'API REST de [Docmost](https://docmost.com) en tant que serveur MCP (Model Context Protocol), permettant aux LLMs et assistants IA de lister et rechercher des espaces, lire des pages, creer et mettre a jour du contenu, deplacer et dupliquer des pages, et gerer les commentaires — sur votre instance Docmost auto-hebergee.

      Enveloppe le serveur Python communautaire [`aleksvin8888/local-docmost-mcp`](https://github.com/aleksvin8888/local-docmost-mcp) avec un shim de transport streamable-HTTP pour que tout client compatible MCP puisse se connecter (Claude Desktop, Claude Code, Cursor, VS Code, etc.).

      **Parfait si vous:** Avez un Docmost auto-heberge et voulez que des assistants IA lisent, ecrivent ou maintiennent son contenu sans payer le plan Enterprise de Docmost (le seul niveau avec support MCP integre).
  developer: Aptero
  icon: https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/DocmostMCP/icon.png
  tagline:
    en_us: MCP server for Docmost — read, write, search, move pages
    fr_fr: Serveur MCP pour Docmost — lire, ecrire, rechercher, deplacer des pages
  title:
    en_us: Docmost MCP
  chips:
    - key: mcp
      name:
        en_us: MCP
  tips:
    before_install:
      en_us: |
        **Configuration required after install**

        Docmost MCP needs Docmost login credentials to call the Docmost REST API on your behalf. The installer seeds a template config — you fill in the email and password before first use.

        **Prerequisites:**
        1. A running **Docmost** instance reachable from the `pcs` Docker network (typically the companion Docmost app installed from this store)
        2. A Docmost user account — **strongly recommended** to create a dedicated service account in Docmost rather than reusing admin, since this MCP can read/write/move every page that account can see

        **Setup (2 steps):**
        1. Open the **File Browser** app and navigate to `/DATA/AppData/docmostmcp/config.json`
        2. Set `base_url` (default `http://docmost` works for the companion app), `email`, and `password`. Save.

        The MCP authenticates against Docmost on first use and caches a JWT at `/DATA/AppData/docmostmcp/token.json`.

        **MCP Integration (for AI/LLMs):**

        **Option 1: Public URL (with hash auth)**
        ```json
        {
          "mcpServers": {
            "docmost-mcp": {
              "type": "http",
              "url": "https://docmostmcp-${APP_DOMAIN}/mcp?hash=${AUTH_HASH}"
            }
          }
        }
        ```

        **Option 2: Local Docker connection (no auth required)**

        For AI assistants running on the same server, connect directly via the Docker network:
        ```json
        {
          "mcpServers": {
            "docmost-mcp": {
              "type": "http",
              "url": "http://docmostmcp:8000/mcp"
            }
          }
        }
        ```
        *Note: Requires the AI assistant to be on the `pcs` Docker network.*

        **Option 3: Via Beacon (aggregated)**

        If you have **Beacon** installed, Docmost MCP auto-registers there via the bundled `beaconify` sidecar and its tools show up under the `docmost-mcp__*` namespace — no extra config.

        **Available MCP Tools:**
        | Tool | Description |
        |------|-------------|
        | `list_spaces` | List all workspace spaces |
        | `search_docs` | Full-text search across pages |
        | `get_page` | Read page content as Markdown |
        | `create_space` | Create a new space |
        | `create_page` | Create a new page from Markdown |
        | `update_page` | Update title/content (replace / append / prepend) |
        | `duplicate_page` | Duplicate a page (recursive) |
        | `move_page` | Move a page within the hierarchy |
        | `move_page_to_space` | Move a page across spaces |
        | `create_comment` | Add a comment to a page |
        | `resolve_comment` | Resolve a comment with a note |

        **Security:**
        - Docmost credentials are stored only in `/DATA/AppData/docmostmcp/config.json` on this server and never logged or returned via the API
        - The MCP endpoint sits behind the Yundera hash-lock — clients need the URL hash or the admin password
