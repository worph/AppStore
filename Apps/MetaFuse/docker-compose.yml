name: metafuse

services:
  metafuse:
    image: ghcr.io/worph/meta-fuse:1.0.0
    container_name: metafuse
    restart: unless-stopped
    privileged: true

    # Web UI, API, and WebDAV port
    expose:
      - 80

    # FUSE capabilities required for virtual filesystem
    devices:
      - /dev/fuse:/dev/fuse

    cap_add:
      - SYS_ADMIN
      - DAC_READ_SEARCH
      - DAC_OVERRIDE

    security_opt:
      - apparmor:unconfined

    volumes:
      # Shared files volume (same as MetaSort - contains watch, plugin, poster, remotes)
      - metamesh-files:/files:ro

      # User's media directories (same paths as MetaSort)
      - /DATA/Downloads:/files/watch/downloads:ro
      - /DATA/Media:/files/watch/media:ro

      # Shared infrastructure volume (leader election, service discovery, Redis)
      # Mounted at fixed path so all MetaMesh apps share the same data
      - /DATA/Apps/MetaCore:/meta-core:rw

      # FUSE virtual filesystem mount point
      - /DATA/MetaFuse/Library:/mnt/virtual:shared

      # Configuration storage
      - /DATA/AppData/metafuse/config:/meta-fuse/config:rw

    environment:
      - NODE_ENV=production
      - META_CORE_PATH=/meta-core
      - FILES_PATH=/files
      - CONFIG_DIR=/meta-fuse/config
      - SERVICE_NAME=meta-fuse
      - SERVICE_VERSION=1.0.0
      - BASE_URL=https://metafuse-$APP_DOMAIN
      - TZ=$TZ

    # Note: Runs as root for FUSE mount operations
    user: 0:0

    labels:
      # ---- metafuse-${APP_DOMAIN} (gateway TLS) ----
      caddy_0: metafuse-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.0_handle: "/health"
      caddy_0.0_handle.reverse_proxy: "{{upstreams 80}}"
      caddy_0.1_handle: "/webdav*"
      caddy_0.1_handle.reverse_proxy: "{{upstreams 80}}"
      caddy_0.2_handle: ""
      caddy_0.2_handle.reverse_proxy: "metafuse-oauth:4180"

      # ---- metafuse-IP.nip.io (gateway TLS) ----
      caddy_1: metafuse-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.0_handle: "/health"
      caddy_1.0_handle.reverse_proxy: "{{upstreams 80}}"
      caddy_1.1_handle: "/webdav*"
      caddy_1.1_handle.reverse_proxy: "{{upstreams 80}}"
      caddy_1.2_handle: ""
      caddy_1.2_handle.reverse_proxy: "metafuse-oauth:4180"

      # ---- metafuse-IP.sslip.io (Let's Encrypt) ----
      caddy_2: metafuse-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.0_handle: "/health"
      caddy_2.0_handle.reverse_proxy: "{{upstreams 80}}"
      caddy_2.1_handle: "/webdav*"
      caddy_2.1_handle.reverse_proxy: "{{upstreams 80}}"
      caddy_2.2_handle: ""
      caddy_2.2_handle.reverse_proxy: "metafuse-oauth:4180"

    networks:
      - metamesh
      - pcs

  # OIDC sidecar — terminates Authorization Code flow for the MetaFuse dashboard.
  # Reads its client + cookie secrets from MetaCore's shared secrets dir.
  # MetaCore must be installed first (pre-install-cmd enforces this).
  metafuse-oauth:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.11.0
    container_name: metafuse-oauth
    hostname: metafuse-oauth
    restart: unless-stopped

    expose:
      - 4180

    volumes:
      - /DATA/AppData/metacore/authelia/secrets:/secrets:ro

    command:
      - --provider=oidc
      - --oidc-issuer-url=https://auth-${APP_DOMAIN}
      - --client-id=metafuse
      - --client-secret-file=/secrets/client-metafuse.plain
      - --cookie-secret-file=/secrets/cookie-metafuse.secret
      - --cookie-domain=metafuse-${APP_DOMAIN}
      - --whitelist-domain=metafuse-${APP_DOMAIN}
      - --redirect-url=https://metafuse-${APP_DOMAIN}/oauth2/callback
      - --upstream=http://metafuse:80
      - --http-address=0.0.0.0:4180
      - --email-domain=*
      - --reverse-proxy=true
      - --pass-access-token=true
      - --set-xauthrequest=true
      - --skip-provider-button=true

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4180/ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

    networks:
      - metamesh
      - pcs

volumes:
  metamesh-files:
    external: true

networks:
  metamesh:
    external: true
  pcs:
    name: pcs
    external: true

x-casaos:
  architectures:
    - amd64
    - arm64
  author: Worph Team
  category: Media
  developer: Aptero Team

  description:
    en_us: |
      **Access your media library through a beautifully organized virtual filesystem.**

      MetaFuse creates a virtual view of your media (Movies, TV Shows, Anime) organized by metadata - while your actual files stay exactly where they are. Access via FUSE mount or WebDAV network share.

      **Key Features:**
      - **Zero File Movement** - Your files stay in place, MetaFuse creates an organized virtual view
      - **FUSE Virtual Filesystem** - Mount as a local directory on your system
      - **WebDAV Network Access** - Access your organized library as a network drive from any device
      - **Smart Organization** - Files organized by title, year, season, episode automatically
      - **Real-time Updates** - Virtual filesystem updates instantly when MetaSort processes new files
      - **Plex/Jellyfin Ready** - Point your media server to the organized virtual library

      **Requires:** MetaCore (install first)

      **Perfect for:** Plex/Jellyfin users, media archivists, or anyone wanting an organized view without reorganizing files

    fr_fr: |
      **Accedez a votre bibliotheque multimedia via un systeme de fichiers virtuel magnifiquement organise.**

      MetaFuse cree une vue virtuelle de vos medias (Films, Series TV, Anime) organisee par metadonnees - pendant que vos fichiers restent exactement ou ils sont. Acces via montage FUSE ou partage reseau WebDAV.

      **Fonctionnalites Cles:**
      - **Zero Deplacement de Fichiers** - Vos fichiers restent en place, MetaFuse cree une vue virtuelle organisee
      - **Systeme de Fichiers Virtuel FUSE** - Montez comme un repertoire local sur votre systeme
      - **Acces Reseau WebDAV** - Accedez a votre bibliotheque organisee comme un lecteur reseau
      - **Organisation Intelligente** - Fichiers organises par titre, annee, saison, episode automatiquement
      - **Mises a Jour Temps Reel** - Le systeme virtuel se met a jour instantanement

      **Necessite:** MetaCore (installer en premier)

  tagline:
    en_us: Virtual filesystem for organized media access - FUSE mount and WebDAV without moving files
    fr_fr: Systeme de fichiers virtuel pour acces media organise - Montage FUSE et WebDAV sans deplacer de fichiers

  title:
    en_us: MetaFuse

  icon: https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaFuse/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaFuse/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaFuse/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaFuse/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaFuse/thumbnail.png

  index: /
  store_app_id: metafuse
  main: metafuse
  is_uncontrolled: false

  tips:
    before_install:
      en_us: |
        **Requires MetaCore** - Install MetaCore first for Redis and authentication.

        MetaFuse will automatically connect to MetaCore for metadata and Authelia for dashboard protection.

        **FUSE Mount:** Your organized virtual library will be available at `/DATA/MetaFuse/Library/`

  pre-install-cmd: |
    if [ ! -f /DATA/AppData/metacore/authelia/secrets/client-metafuse.plain ]; then
      echo "ERROR: MetaCore must be installed before MetaFuse." >&2 &&
      echo "Missing: /DATA/AppData/metacore/authelia/secrets/client-metafuse.plain" >&2 &&
      exit 1;
    fi
