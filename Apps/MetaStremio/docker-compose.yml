name: metastremio

services:
  metastremio:
    image: ghcr.io/worph/meta-stremio:latest
    container_name: metastremio
    restart: unless-stopped

    # Stremio addon port
    expose:
      - 7000

    volumes:
      # Shared files volume (same as MetaSort - contains watch, plugin, poster, remotes)
      - metamesh-files:/files:ro

      # User's media directories (same paths as MetaSort)
      - /DATA/Downloads:/files/watch/downloads:ro
      - /DATA/Media:/files/watch/media:ro

      # Shared infrastructure volume (leader election, service discovery, Redis)
      # Mounted at fixed path so all MetaMesh apps share the same data
      - /DATA/Apps/MetaCore:/meta-core:rw

      # Transcoding cache
      - /DATA/AppData/metastremio/cache:/data/cache

    environment:
      - META_CORE_PATH=/meta-core
      - FILES_PATH=/files
      - MEDIA_DIR=/files/watch
      - CACHE_DIR=/data/cache
      - SEGMENT_DURATION=4
      - PREFETCH_SEGMENTS=4
      - SCHEME=auto
      - SERVICE_NAME=meta-stremio
      - SERVICE_VERSION=1.0.0
      - BASE_URL=https://metastremio-$APP_DOMAIN
      # Use direct connection - discovers Redis via meta-core leader info
      - STORAGE_MODE=direct
      - TZ=$TZ

    labels:
      # No auth - public Stremio addon
      caddy_0: metastremio-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 7000}}"
      caddy_1: metastremio-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 7000}}"
      caddy_2: metastremio-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 7000}}"
    networks:
      - metamesh
      - pcs

volumes:
  metamesh-files:
    external: true

networks:
  metamesh:
    external: true
  pcs:
    name: pcs
    external: true

x-casaos:
  architectures:
    - amd64
    - arm64
  author: Worph Team
  category: Media
  developer: Aptero Team

  description:
    en_us: |
      **Stream your media library directly to Stremio with automatic transcoding.**

      MetaStremio is a Stremio addon that connects to your MetaMesh-indexed media library. Browse movies and TV shows with rich metadata, stream with HLS transcoding, and enjoy your personal collection in Stremio.

      **Key Features:**
      - **Stremio Integration** - Native addon for the Stremio media center
      - **HLS Transcoding** - On-the-fly transcoding for any device compatibility
      - **Rich Metadata** - Movie/TV info, posters, descriptions from TMDB
      - **IMDB Lookup** - Search by IMDB ID to find matching local files
      - **Adaptive Streaming** - Automatic quality adjustment based on bandwidth
      - **Episode Browser** - Full TV series support with season/episode navigation
      - **Direct Play** - Stream original files when transcoding isn't needed

      **Requires:** MetaCore (install first)

      **How to use:** Install the addon in Stremio using the manifest URL from the dashboard

    fr_fr: |
      **Diffusez votre bibliotheque multimedia directement vers Stremio avec transcodage automatique.**

      MetaStremio est un addon Stremio qui se connecte a votre bibliotheque indexee par MetaMesh. Parcourez films et series TV avec metadonnees riches, streamez avec transcodage HLS.

      **Fonctionnalites Cles:**
      - **Integration Stremio** - Addon natif pour le centre multimedia Stremio
      - **Transcodage HLS** - Transcodage a la volee pour compatibilite tous appareils
      - **Metadonnees Riches** - Infos films/TV, affiches, descriptions depuis TMDB
      - **Recherche IMDB** - Recherchez par ID IMDB pour trouver les fichiers locaux correspondants
      - **Streaming Adaptatif** - Ajustement automatique de la qualite selon la bande passante
      - **Navigateur d'Episodes** - Support complet des series TV avec navigation saison/episode

      **Necessite:** MetaCore (installer en premier)

  tagline:
    en_us: Stremio addon for your personal media library - HLS transcoding and TMDB metadata
    fr_fr: Addon Stremio pour votre bibliotheque personnelle - Transcodage HLS et metadonnees TMDB

  title:
    en_us: MetaStremio

  icon: https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaStremio/icon.png
  screenshot_link:
    - https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaStremio/screenshot-1.png
    - https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaStremio/screenshot-2.png
    - https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaStremio/screenshot-3.png
  thumbnail: https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaStremio/thumbnail.png

  index: /
  store_app_id: metastremio
  main: metastremio
  is_uncontrolled: false
  webui_port: 7000

  tips:
    before_install:
      en_us: |
        **Requires MetaCore** - Install MetaCore first for Redis and metadata storage.

        MetaStremio is a public Stremio addon (no authentication required).

        **After installation:**
        1. Open the dashboard at `https://metastremio-$APP_DOMAIN/`
        2. Copy the manifest URL
        3. Add it as an addon in Stremio
