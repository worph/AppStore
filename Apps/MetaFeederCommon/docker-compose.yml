name: metafeedercommon

# =============================================================================
# MetaFeeder · Commons — a standalone open-media feeder for MetaMesh.
#
# Hosts Wikimedia Commons (and Giphy if an API key is set). Split out of
# MetaGateway so you can run only the feeders you want. Headless: it finds
# open-licensed images and returns the records to the MetaGateway core, which
# stores + announces them. The gateway must list this feeder's URL
# (`http://metafeedercommon-feeder:8080`) in its feeders config (on `pcs`).
# =============================================================================

services:
  metafeedercommon-feeder:
    image: ghcr.io/worph/meta-feeder-common:1.0.1
    container_name: metafeedercommon-feeder
    hostname: metafeedercommon-feeder
    restart: unless-stopped
    user: "0:0"
    expose:
      - 8080
    environment:
      RUST_LOG: "info,meta_feeder=info"
      META_FEEDER_STATE_DIR: "/data/meta-feeder"
      # Giphy is opt-in. Blank → the giphy upstream soft-skips (Wikimedia Commons
      # works without it). A future config-UI field will absorb this.
      GIPHY_API_KEY: "${GIPHY_API_KEY:-}"
      TZ: "$TZ"
    volumes:
      - /DATA/AppData/metafeedercommon/state:/data/meta-feeder:rw
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - metafeedercommon
      - pcs

  metafeedercommon:
    image: ghcr.io/yundera/appshield:2.0.3
    container_name: metafeedercommon
    hostname: metafeedercommon
    restart: unless-stopped
    user: "0:0"
    expose:
      - 80
    environment:
      OIDC_REGISTRAR_URL: "http://auth-registrar:9092"
      REDIRECT_HOST_SUFFIXES: "${APP_DOMAIN},${APP_PUBLIC_IP_DASH}.nip.io,${APP_PUBLIC_IP_DASH}.sslip.io"
      CREDENTIAL_VALIDATE_URL: "http://casaos-oidc-bridge:8090/validate"
      BACKEND_HOST: "metafeedercommon-feeder"
      BACKEND_PORT: "8080"
      LISTEN_PORT: "80"
    labels:
      caddy_0: metafeedercommon-${APP_DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 80}}"
      caddy_1: metafeedercommon-${APP_PUBLIC_IP_DASH}.nip.io
      caddy_1.import: gateway_tls
      caddy_1.reverse_proxy: "{{upstreams 80}}"
      caddy_2: metafeedercommon-${APP_PUBLIC_IP_DASH}.sslip.io
      caddy_2.reverse_proxy: "{{upstreams 80}}"
    depends_on:
      - metafeedercommon-feeder
    networks:
      - metafeedercommon
      - pcs

networks:
  metafeedercommon:
    name: metafeedercommon
  pcs:
    name: pcs
    external: true

x-casaos:
  architectures:
    - amd64
    - arm64
  author: Worph Team
  category: Media
  developer: Aptero Team
  main: metafeedercommon
  webui_port: 80
  index: /config

  description:
    en_us: |
      **A standalone open-media feeder for the MetaMesh network.**

      MetaFeeder · Commons bridges **Wikimedia Commons** (and **Giphy** with an
      API key) into MetaMesh. Split out of MetaGateway so you can run only the
      feeders you want.

      **Requires (from the store):**
      - **MetaGateway** — its meta-core stores the resolved records and announces
        them to the swarm. The gateway must list this feeder in its config.
    fr_fr: |
      **Un feeder de médias libres autonome pour le réseau MetaMesh.**

      MetaFeeder · Commons connecte **Wikimedia Commons** (et **Giphy** avec une
      clé API) à MetaMesh. Détaché de MetaGateway. **Nécessite** l'app
      **MetaGateway**.

  tagline:
    en_us: Standalone Wikimedia Commons / Giphy feeder for the MetaMesh network
    fr_fr: Feeder Wikimedia Commons / Giphy autonome pour le réseau MetaMesh

  title:
    en_us: MetaFeeder · Commons

  icon: https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaFeederCommon/icon.png
  thumbnail: https://cdn.jsdelivr.net/gh/Worph/AppStore@main/Apps/MetaFeederCommon/thumbnail.png

  store_app_id: metafeedercommon
  is_uncontrolled: false

  tips:
    before_install:
      en_us: |
        **Install order:** install **MetaGateway** first.

        **After installing this app:** in **MetaGateway**, make sure this feeder
        is listed in its feeders config (`http://metafeedercommon-feeder:8080`) so
        it gets discovered. Wikimedia Commons needs no setup; Giphy is opt-in (set
        `GIPHY_API_KEY` in this app's compose).

        **Authentication:** the config UI is protected by Yundera's Authelia (OIDC).

  pre-install-cmd: |
    mkdir -p /DATA/AppData/metafeedercommon/state
